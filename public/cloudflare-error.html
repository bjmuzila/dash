<!DOCTYPE html>
<!--
  Bzila / CB Edge custom error page for Cloudflare (502 / 503 / 504).
  Fully self-contained: no external CSS/JS/font requests, because when this page
  shows the ORIGIN IS DOWN and cannot serve assets.

  HOW TO USE:
  Cloudflare Dashboard -> your domain -> Rules -> (or) Custom Pages
  -> "5xx Server Error" / "Web Server Down (502/504)" -> Custom Pages
  -> paste this whole file. Cloudflare requires the page contain the token
  ::CLOUDFLARE_ERROR_500S_BOX:: somewhere — it's included near the bottom,
  visually hidden. Logo is embedded as base64 so it renders even with origin down.
-->
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>CB Edge — Temporarily Down</title>
<style>
  :root{
    --bg:#05060A; --panel:#0D1119; --cyan:#219EBC; --purple:#126783;
    --orange:#FB8501; --green:#1FD98A; --red:#EF4444; --text:#fff;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{
    background:var(--bg);
    background-image:
      radial-gradient(circle at 15% 50%, rgba(33,158,188,.05) 0%, transparent 50%),
      radial-gradient(circle at 85% 30%, rgba(18,103,131,.06) 0%, transparent 50%);
    color:var(--text);
    font-family:'Inter','Helvetica Neue',Arial,sans-serif;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    text-align:center;padding:24px;
  }

  /* ---------- STAGE ---------- */
  .bz-stage{position:relative;width:100%;max-width:600px;height:250px;margin:0 auto;overflow:hidden;user-select:none}
  .bz-floor{position:absolute;left:4%;right:4%;bottom:46px;height:2px;
    background:linear-gradient(90deg,transparent,#219EBC55,transparent);box-shadow:0 0 12px #219EBC40}

  .bz-hidewall{position:absolute;bottom:60px;left:50%;margin-left:-22px;width:44px;height:32px;border-radius:5px;
    background:linear-gradient(180deg,#1a2230,#0d1119);border:1px solid #219EBC55;box-shadow:0 0 12px rgba(0,0,0,.5);
    transform:translateX(140px) scale(.85);z-index:6;display:flex;align-items:center;justify-content:center}
  .bz-hidewall span{font:700 15px/1 'Inter',Arial,sans-serif;color:#219EBC;letter-spacing:.06em}
  .bz-hidewall::after{content:"";position:absolute;left:50%;bottom:-16px;width:3px;height:16px;background:#1a2230;margin-left:-1.5px}

  .bz-hero{position:absolute;bottom:40px;left:50%;width:96px;height:96px;margin-left:-48px;z-index:4;
    animation:bzHeroX 20s cubic-bezier(.45,.05,.35,1) forwards}
  .bz-hero-inner{position:relative;width:100%;height:100%;transform-origin:50% 90%;animation:bzHeroGag 20s ease-in-out forwards}
  .bz-hero-img{width:100%;height:100%;object-fit:contain;border-radius:50%;
    border:2px solid #219EBC88;box-shadow:0 0 22px #219EBC55,0 6px 18px rgba(0,0,0,.6);
    background:var(--panel);animation:bzHeroBob .4s ease-in-out infinite}
  @keyframes bzHeroX{
    0%{transform:translateX(380px)}16%{transform:translateX(-30px)}20%{transform:translateX(-40px)}28%{transform:translateX(-40px)}
    37%{transform:translateX(-110px)}43%{transform:translateX(-150px)}50%{transform:translateX(-150px)}58%{transform:translateX(-90px)}
    72%{transform:translateX(90px)}80%{transform:translateX(120px)}84%{transform:translateX(130px)}88%{transform:translateX(110px)}100%{transform:translateX(0)}
  }
  @keyframes bzHeroGag{
    0%{transform:scaleX(-1) translateY(0) rotate(0deg)}19%{transform:scaleX(-1) translateY(0) rotate(0deg)}
    22%{transform:scaleX(-1) translateY(18px) rotate(-78deg)}28%{transform:scaleX(-1) translateY(18px) rotate(-82deg)}
    32%{transform:scaleX(-1) translateY(0) rotate(0deg)}50%{transform:scaleX(-1) translateY(0) rotate(0deg)}
    54%{transform:scaleX(1) translateY(0) rotate(0deg)}84%{transform:scaleX(1) translateY(0) rotate(8deg)}100%{transform:scaleX(1) translateY(0) rotate(0deg)}
  }
  @keyframes bzHeroBob{0%,100%{translate:0 0}50%{translate:0 -4px}}

  .bz-green{position:absolute;right:-12px;top:30px;z-index:5;filter:drop-shadow(0 0 8px #1FD98A88);transform-origin:50% 80%;
    animation:bzGreenHeld 20s ease-in-out forwards}
  @keyframes bzGreenHeld{
    0%,19%{transform:rotate(35deg) translateY(0)}22%{transform:rotate(80deg) translateY(10px)}32%{transform:rotate(80deg) translateY(10px)}
    50%{transform:rotate(-20deg)}54%{transform:rotate(-35deg)}
    84%{transform:rotate(40deg)}88%{transform:rotate(20deg)}100%{transform:rotate(-30deg)}
  }

  .bz-dust{position:absolute;bottom:-2px;left:50%;width:10px;height:10px;margin-left:-5px;border-radius:50%;
    background:radial-gradient(circle,rgba(255,255,255,.5),transparent 70%);opacity:0;animation:bzDust 20s linear forwards}
  @keyframes bzDust{0%,21.5%{opacity:0;transform:scale(.3)}23%{opacity:.9;transform:scale(2) translateX(8px)}28%{opacity:0;transform:scale(3) translateX(16px)}100%{opacity:0}}

  .bz-red{position:absolute;bottom:44px;left:50%;margin-left:-42px;z-index:3;
    filter:drop-shadow(0 0 10px #EF444466);animation:bzRedMove 20s cubic-bezier(.45,.05,.35,1) forwards}
  @keyframes bzRedMove{
    0%{transform:translateX(500px) rotate(8deg);opacity:1}16%{transform:translateX(50px) rotate(8deg)}24%{transform:translateX(30px) rotate(20deg)}
    43%{transform:translateX(-60px) rotate(8deg)}50%{transform:translateX(-90px) rotate(8deg) scaleX(1)}54%{transform:translateX(-60px) rotate(-6deg) scaleX(-1)}
    64%{transform:translateX(60px) rotate(-6deg) scaleX(-1)}74%{transform:translateX(140px) rotate(-6deg) scale(.82) scaleX(-1)}
    80%{transform:translateX(140px) rotate(-6deg) scale(.82) scaleX(-1)}83%{transform:translateX(140px) rotate(10deg) scale(.85) scaleX(-1)}
    84%{transform:translateX(132px) rotate(18deg) scale(.9)}85%{transform:translateX(132px) rotate(18deg) scale(.8);opacity:.95}
    90%{transform:translateX(150px) rotate(70deg) translateY(26px) scale(.82);opacity:.95}
    95%{transform:translateX(158px) rotate(96deg) translateY(46px) scale(.82);opacity:.85}
    98%{transform:translateX(158px) rotate(86deg) translateY(46px) scale(.82);opacity:.8}
    100%{transform:translateX(158px) rotate(90deg) translateY(46px) scale(.82);opacity:.75}
  }

  .bz-flash{position:absolute;bottom:84px;left:50%;margin-left:60px;width:14px;height:14px;border-radius:50%;
    background:radial-gradient(circle,#fff 0%,var(--orange) 40%,transparent 70%);opacity:0;z-index:6;
    animation:bzFlash 20s linear forwards}
  @keyframes bzFlash{0%,83.4%{opacity:0;transform:scale(.2)}84%{opacity:1;transform:scale(3)}87%{opacity:0;transform:scale(3.8)}100%{opacity:0}}

  .bz-shard{position:absolute;bottom:90px;left:50%;margin-left:56px;width:6px;height:6px;background:var(--red);opacity:0;z-index:6;border-radius:1px}
  .bz-shard-1{animation:bzShard1 20s ease-out forwards}
  .bz-shard-2{animation:bzShard2 20s ease-out forwards}
  .bz-shard-3{animation:bzShard3 20s ease-out forwards}
  .bz-shard-4{animation:bzShard4 20s ease-out forwards}
  @keyframes bzShard1{0%,83.4%{opacity:0;transform:translate(0,0) rotate(0)}84%{opacity:1}91%,100%{opacity:0;transform:translate(40px,-34px) rotate(220deg)}}
  @keyframes bzShard2{0%,83.4%{opacity:0;transform:translate(0,0) rotate(0)}84%{opacity:1}91%,100%{opacity:0;transform:translate(34px,24px) rotate(-180deg)}}
  @keyframes bzShard3{0%,83.4%{opacity:0;transform:translate(0,0) rotate(0)}84%{opacity:1}91%,100%{opacity:0;transform:translate(22px,-46px) rotate(300deg)}}
  @keyframes bzShard4{0%,83.4%{opacity:0;transform:translate(0,0) rotate(0)}84%{opacity:1}91%,100%{opacity:0;transform:translate(52px,6px) rotate(-260deg)}}

  .code{font-size:clamp(64px,14vw,132px);font-weight:800;line-height:1;letter-spacing:-.04em;margin-top:8px;
    background:linear-gradient(180deg,var(--cyan),var(--purple));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
  h1{font-size:clamp(18px,3vw,26px);font-weight:700;margin:12px 0 6px}
  p{color:rgba(255,255,255,.55);max-width:460px;margin:0 auto 24px;font-size:14px;line-height:1.6}
  .btn{padding:10px 20px;border-radius:6px;border:1px solid rgba(33,158,188,.25);
    background:linear-gradient(180deg,rgba(33,158,188,.12),rgba(33,158,188,.04));color:var(--cyan);
    font-size:12px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;text-decoration:none;display:inline-block}
  .cf-box{position:absolute;left:-9999px;top:-9999px}

  @media (prefers-reduced-motion: reduce){
    .bz-hero,.bz-hero-inner,.bz-red,.bz-green,.bz-flash,.bz-shard,.bz-hero-img,.bz-dust{animation:none!important}
    .bz-hero{transform:translateX(0)}
    .bz-hero-inner{transform:scaleX(1)}
    .bz-green{transform:rotate(-30deg)}
    .bz-red{opacity:0}
    .bz-hidewall{display:none}
  }
</style>
</head>
