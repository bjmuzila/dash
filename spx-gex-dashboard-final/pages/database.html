  <!-- ═══ PAGE: DATABASE ═══ -->
  <div id="page-database" style="display:none;flex:1;flex-direction:column;min-height:0;overflow:hidden;background:var(--bg0)">

    <!-- Header -->
    <div style="padding:7px 16px;background:var(--bg1);border-bottom:1px solid var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:space-between;gap:10px">
      <div style="display:flex;align-items:center;gap:10px">
        <span style="font-size:11px;font-weight:700;color:var(--cyan);letter-spacing:.15em;text-transform:uppercase">🗄 Knowledge Base</span>
        <span id="kb-entry-count" style="font-size:9px;color:var(--text3)"></span>
      </div>
      <div style="display:flex;align-items:center;gap:6px">
        <span id="kb-view-label" style="font-size:9px;color:var(--text3);letter-spacing:.1em;text-transform:uppercase"></span>
        <button onclick="kbBack()" id="kb-back-btn" style="display:none;font-size:9px;padding:2px 8px;background:var(--bg3);border:1px solid var(--border2);color:var(--text1);border-radius:2px;cursor:pointer;font-family:Arial;letter-spacing:.08em;text-transform:uppercase">← Back</button>
      </div>
    </div>

    <!-- Search bar (always visible) -->
    <div style="padding:10px 16px;background:var(--bg1);border-bottom:1px solid var(--border);flex-shrink:0">
      <div style="position:relative;max-width:600px">
        <div style="position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:14px;pointer-events:none">⌕</div>
        <input
          id="kb-search-input"
          type="text"
          placeholder="Search terms, concepts, setups, rules…"
          onkeyup="kbSearch(this.value)"
          style="width:100%;padding:8px 36px 8px 34px;background:var(--bg2);border:1px solid var(--border2);border-radius:2px;color:var(--text0);font-size:12px;font-family:Arial,sans-serif;outline:none;transition:border-color .15s"
          onfocus="this.style.borderColor='var(--cyan)'"
          onblur="this.style.borderColor='var(--border2)'"
        />
        <button onclick="kbClearSearch()" id="kb-clear-btn" style="display:none;position:absolute;right:8px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text3);cursor:pointer;font-size:13px;line-height:1">✕</button>
      </div>
    </div>

    <!-- Main content area -->
    <div style="flex:1;min-height:0;overflow:hidden;display:flex;flex-direction:column">

      <!-- LANDING VIEW -->
      <div id="kb-landing" style="flex:1;overflow-y:auto;padding:24px 16px">

        <!-- Category filter pills -->
        <div style="display:flex;gap:5px;flex-wrap:wrap;margin-bottom:20px">
          <button class="kb-cat-pill active" onclick="kbFilterCat('all',this)">All</button>
          <button class="kb-cat-pill" onclick="kbFilterCat('tape reading',this)">Tape Reading</button>
          <button class="kb-cat-pill" onclick="kbFilterCat('gex',this)">GEX / DEX</button>
          <button class="kb-cat-pill" onclick="kbFilterCat('setups',this)">Setups</button>
          <button class="kb-cat-pill" onclick="kbFilterCat('risk',this)">Risk Management</button>
          <button class="kb-cat-pill" onclick="kbFilterCat('entries',this)">Entries</button>
          <button class="kb-cat-pill" onclick="kbFilterCat('exits',this)">Exits</button>
          <button class="kb-cat-pill" onclick="kbFilterCat('market structure',this)">Market Structure</button>
          <button class="kb-cat-pill" onclick="kbFilterCat('psychology',this)">Psychology</button>
        </div>

        <!-- Entry grid -->
        <div id="kb-grid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:8px"></div>

        <!-- Empty state -->
        <div id="kb-empty" style="display:none;padding:60px 20px;text-align:center;opacity:0.2">
          <div style="font-size:36px;margin-bottom:10px">🗄</div>
          <div style="font-size:10px;color:var(--text2);letter-spacing:.15em;text-transform:uppercase;font-weight:700">Knowledge base is empty</div>
          <div style="font-size:9px;color:var(--text3);letter-spacing:.08em;margin-top:6px">Entries coming soon</div>
        </div>
      </div>

      <!-- SEARCH RESULTS VIEW -->
      <div id="kb-results-view" style="display:none;flex:1;overflow-y:auto;padding:16px">
        <div id="kb-results-count" style="font-size:9px;color:var(--text3);letter-spacing:.1em;text-transform:uppercase;margin-bottom:12px"></div>
        <div id="kb-results-grid" style="display:flex;flex-direction:column;gap:6px"></div>
        <div id="kb-no-results" style="display:none;padding:60px 20px;text-align:center;opacity:0.25">
          <div style="font-size:32px;margin-bottom:10px">🔍</div>
          <div style="font-size:10px;color:var(--text2);letter-spacing:.15em;text-transform:uppercase;font-weight:700">No results found</div>
          <div style="font-size:9px;color:var(--text3);margin-top:6px">Try a different term</div>
        </div>
      </div>

      <!-- ENTRY DETAIL VIEW -->
      <div id="kb-detail-view" style="display:none;flex:1;overflow-y:auto;padding:0">
        <div id="kb-detail-inner" style="max-width:720px;margin:0 auto;padding:32px 24px"></div>
      </div>

    </div>
  </div>

  <style>
    .kb-cat-pill {
      font-size:10px; padding:3px 10px; border-radius:20px;
      background:var(--bg3); border:1px solid var(--border2);
      color:var(--text1); cursor:pointer; font-family:Arial,sans-serif;
      letter-spacing:.06em; text-transform:uppercase; transition:all .1s;
    }
    .kb-cat-pill:hover { background:var(--bg4); color:var(--text0); }
    .kb-cat-pill.active { background:var(--bg4); color:var(--cyan); border-color:#00e5ff44; }

    .kb-card {
      background:var(--bg1); border:1px solid var(--border); border-radius:2px;
      padding:14px; cursor:pointer; transition:all .12s; display:flex; flex-direction:column; gap:6px;
    }
    .kb-card:hover { background:var(--bg2); border-color:var(--border2); }
    .kb-card-title { font-size:12px; font-weight:700; color:var(--text0); line-height:1.3; }
    .kb-card-preview { font-size:10px; color:var(--text2); line-height:1.5; }
    .kb-card-footer { display:flex; align-items:center; gap:5px; flex-wrap:wrap; margin-top:2px; }

    .kb-cat-badge {
      font-size:8px; padding:1px 6px; border-radius:2px;
      font-weight:700; letter-spacing:.08em; text-transform:uppercase;
    }
    .kb-tag {
      font-size:8px; padding:1px 5px; border-radius:2px;
      background:var(--bg3); border:1px solid var(--border);
      color:var(--text3); letter-spacing:.05em;
    }

    .kb-result-row {
      background:var(--bg1); border:1px solid var(--border); border-radius:2px;
      padding:12px 14px; cursor:pointer; transition:all .1s;
      display:flex; align-items:flex-start; gap:12px;
    }
    .kb-result-row:hover { background:var(--bg2); border-color:var(--border2); }

    .kb-detail-section { margin-bottom:24px; }
    .kb-detail-section-label {
      font-size:9px; font-weight:700; color:var(--text3);
      letter-spacing:.15em; text-transform:uppercase; margin-bottom:8px;
      padding-bottom:5px; border-bottom:1px solid var(--border);
    }
    .kb-detail-body {
      font-size:12px; color:var(--text1); line-height:1.8;
    }
    .kb-detail-body p { margin-bottom:10px; }
    .kb-detail-body strong { color:var(--text0); }
    .kb-detail-body .highlight {
      background:var(--bg3); border-left:2px solid var(--cyan);
      padding:8px 12px; border-radius:0 2px 2px 0;
      margin:10px 0; font-size:11px; color:var(--text0);
    }
    .kb-detail-body .rule {
      background:#0a1018; border-left:2px solid var(--amber);
      padding:8px 12px; border-radius:0 2px 2px 0;
      margin:10px 0; font-size:11px; color:var(--text0);
    }
    .kb-related-link {
      font-size:10px; padding:3px 10px; border-radius:2px;
      background:var(--bg3); border:1px solid var(--border2);
      color:var(--cyan); cursor:pointer; font-family:Arial,sans-serif;
      letter-spacing:.05em; transition:all .1s; display:inline-block; margin:2px;
    }
    .kb-related-link:hover { background:var(--bg4); }

    .kb-highlight { background:rgba(0,229,255,0.2); color:var(--cyan); border-radius:1px; padding:0 1px; }
  </style>
