<div id="mg-main" style="display:flex;position:absolute;inset:0;overflow:hidden;background:var(--bg0);flex-direction:column;font-family:Arial,sans-serif">

  <!-- Toolbar -->
  <div style="display:flex;align-items:center;gap:8px;padding:8px 14px;background:var(--bg1);border-bottom:1px solid var(--border);flex-shrink:0;flex-wrap:wrap">
    <div style="font-size:11px;font-weight:800;color:var(--cyan);letter-spacing:.14em;text-transform:uppercase">Mult-Greek</div>
    <!-- Expiry dropdown (shared across SPX / SPY / QQQ) -->
    <select id="mg-expiry-select" style="font-size:10px;font-weight:800;padding:4px 8px;border:1px solid rgba(255,255,255,.18);border-radius:4px;background:#0a0e14;color:#e4e4e7;cursor:pointer;font-family:Arial;outline:none">
      <option value="" style="background:#0a0e14;color:#e4e4e7">-- Expiry --</option>
    </select>
    <!-- Load button -->
    <button onclick="mgGo()" id="mg-go-btn" style="font-size:10px;font-weight:800;padding:4px 14px;border:1px solid rgba(0,229,255,.6);border-radius:4px;background:rgba(0,229,255,.15);color:#00e5ff;cursor:pointer;font-family:Arial;letter-spacing:.06em">GO</button>
    <!-- Refresh button -->
    <button onclick="mgManualRefresh()" id="mg-refresh-btn" class="btn btn-ghost btn-sm" style="font-size:10px;font-weight:800;padding:4px 10px;border:1px solid rgba(0,229,255,.45);border-radius:4px;background:rgba(0,229,255,.08);color:var(--cyan);cursor:pointer;font-family:Arial;letter-spacing:.06em">&#8635; Now</button>
    <span id="mg-refresh-time" style="font-size:9px;color:var(--text3);font-family:Arial,monospace"></span>
    <!-- Contracts basis flipper: OI+Vol vs Vol only -->
    <div style="display:flex;gap:0;border:1px solid rgba(255,255,255,.12);border-radius:4px;overflow:hidden">
      <button id="mg-mode-oivol" onclick="mgSetContractMode('oivol')" title="Net greeks from volume + open interest" style="font-size:9px;font-weight:800;padding:4px 8px;border:none;background:transparent;color:#64748b;cursor:pointer;font-family:Arial;letter-spacing:.06em">OI+VOL</button>
      <button id="mg-mode-vol" onclick="mgSetContractMode('vol')" title="Net greeks from volume only" style="font-size:9px;font-weight:800;padding:4px 8px;border:none;border-left:1px solid rgba(255,255,255,.12);background:transparent;color:#64748b;cursor:pointer;font-family:Arial;letter-spacing:.06em">VOL</button>
    </div>
    <div style="flex:1"></div>
    <!-- Intensity slider -->
    <div style="display:flex;align-items:center;gap:8px;color:#94a3b8;font-size:9px;font-weight:800;letter-spacing:.08em;text-transform:uppercase">
      <span>Intensity</span>
      <input id="mg-intensity" type="range" min="0.01" max="3.0" step="0.01" value="0.1" oninput="mgSetIntensity(this.value)" style="width:100px;accent-color:#00e5ff;cursor:pointer">
      <span id="mg-intensity-val" style="min-width:36px;text-align:right;color:#00e5ff">0.10x</span>
    </div>
    <!-- Cache badge -->
    <div id="mg-cache-badge" style="display:none;align-items:center;gap:4px;padding:3px 7px;border:1px solid rgba(0,229,255,.25);border-radius:4px;background:rgba(0,229,255,.07)" title="Chains cached today">
      <span style="font-size:9px;color:#475569;font-weight:800;letter-spacing:.08em">CACHED</span>
      <span id="mg-cache-count" style="font-size:10px;color:#00e5ff;font-weight:800;font-family:Arial,monospace">0</span>
    </div>
    <!-- Status -->
    <div id="mg-status-dot" style="width:7px;height:7px;border-radius:50%;background:#1e293b;transition:background .3s"></div>
    <span id="mg-status-txt" style="font-size:9px;color:#475569;font-weight:800;letter-spacing:.08em">--</span>
    <span id="mg-last-update" style="font-size:9px;color:#334155;font-family:Arial,monospace">--:--:--</span>
    <!-- Share buttons (pillbox: transparent background per snapshot.md) -->
    <div style="display:flex;gap:2px;background:transparent;border-radius:2px;padding:2px">
      <button id="mg-copy-shot-btn" onclick="mgCopyScreenshot()" title="Copy screenshot" style="font-size:9px;padding:2px 8px;border:none;border-radius:2px;background:transparent;color:#00e5ff;cursor:pointer;font-family:Arial;font-weight:700">COPY</button>
      <button id="mg-share-x-btn" onclick="mgShare('x')" title="Copy and open X" style="font-size:9px;padding:2px 8px;border:none;border-radius:2px;background:transparent;color:#00e5ff;cursor:pointer;font-family:Arial;font-weight:700">X</button>
      <button id="mg-share-discord-btn" onclick="mgShare('discord')" title="Post to Discord" style="font-size:9px;padding:2px 8px;border:none;border-radius:2px;background:transparent;color:#7289da;cursor:pointer;font-family:Arial;font-weight:700">DISCORD</button>
    </div>
  </div>

  <!-- ── CAPTURE ZONE: three ticker panels ── -->
  <div id="mg-capture-zone" style="flex:1;display:flex;gap:8px;min-height:0;background:#05080d;padding:8px;overflow:hidden">
    <!-- Panels populated by JS (one per ticker: SPX / SPY / QQQ) -->
  </div>
  <!-- ── END CAPTURE ZONE ── -->
</div>
