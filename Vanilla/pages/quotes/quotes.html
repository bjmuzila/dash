<div id="page-quotes" style="display:flex;flex-direction:column;flex:1;min-height:0;background:var(--bg0);color:var(--text2);font-family:Arial,sans-serif">
  <style>
    #quotes-container {
      display: flex;
      flex-direction: column;
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      gap: 1px;
      background: var(--bg0);
    }

    .quote-row {
      display: grid;
      grid-template-columns: 0.8fr 1fr 1fr 1.2fr;
      gap: 12px;
      padding: 10px 14px;
      align-items: center;
      border-bottom: 1px solid #1a2a3a;
      transition: background-color 0.15s ease;
    }

    .quote-row:hover {
      background-color: rgba(0, 229, 255, 0.05);
    }

    .quote-symbol {
      font-weight: 700;
      font-size: 13px;
      color: var(--cyan);
      letter-spacing: 0.5px;
      font-variant-numeric: tabular-nums;
    }

    .quote-price {
      font-weight: 600;
      font-size: 13px;
      color: #fff;
      font-variant-numeric: tabular-nums;
    }

    .quote-change {
      font-weight: 600;
      font-size: 13px;
      font-variant-numeric: tabular-nums;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .quote-change.up {
      color: #00d876;
    }

    .quote-change.down {
      color: #ff4444;
    }

    .quote-change-arrow {
      font-size: 11px;
      font-weight: 700;
      margin-right: 2px;
    }

    .quote-bid-ask {
      display: flex;
      gap: 8px;
      font-size: 11px;
      color: #9fb0bf;
      font-variant-numeric: tabular-nums;
    }

    .quote-status {
      font-size: 10px;
      color: #666;
      margin-top: 4px;
      font-family: monospace;
    }

    .quotes-header {
      display: grid;
      grid-template-columns: 0.8fr 1fr 1fr 1.2fr;
      gap: 12px;
      padding: 8px 14px;
      background: #0a0f16;
      border-bottom: 1px solid #1a2a3a;
      font-size: 10px;
      font-weight: 700;
      color: #7fa3bf;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .quotes-empty {
      padding: 40px 20px;
      text-align: center;
      color: #666;
      font-size: 12px;
    }

    .quotes-loading {
      padding: 40px 20px;
      text-align: center;
      color: #7fa3bf;
      font-size: 12px;
    }

    .quotes-spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid #1a3a5f;
      border-top: 2px solid #00e5ff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-right: 8px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>

  <!-- Toolbar -->
  <div style="display:flex;align-items:center;gap:8px;padding:8px 14px;background:#0a0f16;border-bottom:1px solid #1a2a3a;flex-shrink:0">
    <div style="font-weight:700;color:var(--cyan);font-size:13px">Quotes</div>
    <input type="text" id="quote-search" placeholder="Search symbol..." style="flex:1;max-width:200px;padding:4px 8px;font-size:11px;background:#070c14;border:1px solid #1a2a3a;border-radius:3px;color:#fff">
    <button onclick="reloadQuotes()" style="padding:4px 10px;font-size:10px;background:#0d1825;border:1px solid #1a3a5f;border-radius:3px;color:#00e5ff;cursor:pointer;font-weight:700">RELOAD</button>
  </div>

  <!-- Quotes List -->
  <div id="quotes-container">
    <div class="quotes-loading">
      <div class="quotes-spinner"></div>
      Loading quotes...
    </div>
  </div>
</div>

<script>
window.QuotesPanel = {
  symbols: ['/ES', '/NQ', 'SPX', 'SPCX', 'VIX', 'SPY', 'QQQ', 'SMH', 'AAPL', 'AMD', 'AMZN', 'GOOGL', 'META', 'MSFT', 'NVDA', 'TSLA'],

  init() {
    const searchInput = document.getElementById('quote-search');
    if (searchInput) searchInput.addEventListener('input', () => this.renderFromCache());

    // Wait for QuotesManager then start 5s render loop
    const start = () => {
      this.renderFromCache();
      setInterval(() => this.renderFromCache(), 5000);
    };

    if (window.QuotesManager) {
      start();
    } else {
      document.addEventListener('DOMContentLoaded', () => {
        setTimeout(start, 600); // after QM auto-init
      });
    }
  },

  formatPrice(price) {
    if (!price) return '—';
    return parseFloat(price).toFixed(2);
  },

  renderFromCache() {
    const container = document.getElementById('quotes-container');
    if (!container || !window.QuotesManager) return;

    const searchVal = document.getElementById('quote-search')?.value.toUpperCase() || '';
    let rows = '';
    let visibleCount = 0;

    this.symbols.forEach(sym => {
      const matches = searchVal === '' || sym.toUpperCase().includes(searchVal);
      if (!matches) return;

      const q = window.QuotesManager.getQuote(sym);
      const changeData = window.QuotesManager.getChange(sym);
      visibleCount++;

      const last = q?.last ? this.formatPrice(q.last) : '—';
      const bid  = q?.bid  ? this.formatPrice(q.bid)  : '—';
      const ask  = q?.ask  ? this.formatPrice(q.ask)  : '—';

      const changeClass = changeData ? (changeData.up ? 'up' : 'down') : '';
      const changeDisplay = changeData
        ? `<span class="quote-change-arrow">${changeData.icon}</span><span>${changeData.up ? '+' : ''}${changeData.changePercent}%</span>`
        : '—';

      rows += `
        <div class="quote-row">
          <div class="quote-symbol">${sym}</div>
          <div class="quote-price">${last}</div>
          <div class="quote-change ${changeClass}">${changeDisplay}</div>
          <div class="quote-bid-ask">
            <span>B: ${bid}</span>
            <span>A: ${ask}</span>
          </div>
        </div>
      `;
    });

    const headerHtml = '<div class="quotes-header"><div>SYMBOL</div><div>PRICE</div><div>CHANGE</div><div>BID / ASK</div></div>';
    container.innerHTML = visibleCount === 0
      ? headerHtml + '<div class="quotes-empty">No matches found</div>'
      : headerHtml + rows;
  }
};

if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', () => window.QuotesPanel.init());
} else {
  window.QuotesPanel.init();
}

function reloadQuotes() {
  window.QuotesPanel.renderFromCache();
}
</script>
