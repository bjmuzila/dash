<div id="page-quotes" style="display:flex;flex-direction:column;flex:1;min-height:0;background:var(--bg0);color:var(--text2);font-family:Arial,sans-serif">
  <style>
    #quotes-container {
      display: flex;
      flex-direction: column;
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      gap: 1px;
      background: var(--bg0);
    }

    .quote-row {
      display: grid;
      grid-template-columns: 0.8fr 1fr 1fr 1.2fr;
      gap: 12px;
      padding: 10px 14px;
      align-items: center;
      border-bottom: 1px solid #1a2a3a;
      transition: background-color 0.15s ease;
    }

    .quote-row:hover {
      background-color: rgba(0, 229, 255, 0.05);
    }

    .quote-symbol {
      font-weight: 700;
      font-size: 13px;
      color: var(--cyan);
      letter-spacing: 0.5px;
      font-variant-numeric: tabular-nums;
    }

    .quote-price {
      font-weight: 600;
      font-size: 13px;
      color: #fff;
      font-variant-numeric: tabular-nums;
    }

    .quote-change {
      font-weight: 600;
      font-size: 13px;
      font-variant-numeric: tabular-nums;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .quote-change.up {
      color: #00d876;
    }

    .quote-change.down {
      color: #ff4444;
    }

    .quote-change-arrow {
      font-size: 11px;
      font-weight: 700;
      margin-right: 2px;
    }

    .quote-bid-ask {
      display: flex;
      gap: 8px;
      font-size: 11px;
      color: #9fb0bf;
      font-variant-numeric: tabular-nums;
    }

    .quote-status {
      font-size: 10px;
      color: #666;
      margin-top: 4px;
      font-family: monospace;
    }

    .quotes-header {
      display: grid;
      grid-template-columns: 0.8fr 1fr 1fr 1.2fr;
      gap: 12px;
      padding: 8px 14px;
      background: #0a0f16;
      border-bottom: 1px solid #1a2a3a;
      font-size: 10px;
      font-weight: 700;
      color: #7fa3bf;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .quotes-empty {
      padding: 40px 20px;
      text-align: center;
      color: #666;
      font-size: 12px;
    }

    .quotes-loading {
      padding: 40px 20px;
      text-align: center;
      color: #7fa3bf;
      font-size: 12px;
    }

    .quotes-spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid #1a3a5f;
      border-top: 2px solid #00e5ff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-right: 8px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>

  <!-- Toolbar -->
  <div style="display:flex;align-items:center;gap:8px;padding:8px 14px;background:#0a0f16;border-bottom:1px solid #1a2a3a;flex-shrink:0">
    <div style="font-weight:700;color:var(--cyan);font-size:13px">Quotes</div>
    <input type="text" id="quote-search" placeholder="Search symbol..." style="flex:1;max-width:200px;padding:4px 8px;font-size:11px;background:#070c14;border:1px solid #1a2a3a;border-radius:3px;color:#fff">
    <button onclick="reloadQuotes()" style="padding:4px 10px;font-size:10px;background:#0d1825;border:1px solid #1a3a5f;border-radius:3px;color:#00e5ff;cursor:pointer;font-weight:700">RELOAD</button>
  </div>

  <!-- Quotes List -->
  <div id="quotes-container">
    <div class="quotes-loading">
      <div class="quotes-spinner"></div>
      Loading quotes...
    </div>
  </div>
</div>

<script>
// Quotes Management
window.QuotesPanel = {
  // Edit this list to add/remove symbols from the quotes panel
  symbols: ['/ES', '/NQ', 'SPX', 'SPCX', 'VIX', 'SPY', 'QQQ', 'SMH', 'AAPL', 'AMD', 'AMZN', 'GOOGL', 'META', 'MSFT', 'NVDA', 'TSLA'],
  quotes: {},
  prevCloses: {},
  pageId: 'quotes-' + Date.now(),

  async init() {
    console.log('[Quotes] Initializing quotes panel');

    // Set up search
    const searchInput = document.getElementById('quote-search');
    if (searchInput) {
      searchInput.addEventListener('input', (e) => {
        this.filterQuotes(e.target.value);
      });
    }

    // Load previous closes
    await this.loadPrevCloses();

    // Subscribe to symbols (non-blocking)
    this.subscribeSymbols().catch(e => console.warn('[Quotes] Subscription init failed:', e.message));

    // Render initial quotes
    this.render();

    // Auto-refresh every 30 seconds
    setInterval(() => {
      console.log('[Quotes] Auto-refreshing quotes...');
      this.render();
    }, 30000);
  },

  async loadPrevCloses() {
    try {
      console.log('[Quotes] Loading previous closes...');
      const response = await fetch('/proxy/api/spx-prevclose');
      console.log('[Quotes] prevclose response status:', response.status);

      if (!response.ok) {
        console.warn('[Quotes] prevclose API returned:', response.status);
        return;
      }

      const data = await response.json();
      console.log('[Quotes] prevclose data:', data);

      if (data && typeof data === 'object') {
        // Map API response to symbols
        if (data.prevClose !== undefined) {
          this.prevCloses = {
            '/ES': data.prevClose,
            '/NQ': data.prevClose
          };
        } else {
          this.prevCloses = { ...data };
        }
        console.log('[Quotes] Processed previous closes:', this.prevCloses);
      }
    } catch (e) {
      console.error('[Quotes] Failed to load previous closes:', e.message);
    }
  },

  async subscribeSymbols() {
    try {
      // Use subscription manager to ensure symbols are loaded
      const result = await SubscriptionManagerClient.subscribeAndWait(
        this.pageId,
        this.symbols,
        { timeout: 3000, threshold: 0.5 }
      );
      console.log('[Quotes] Subscription result:', result);
    } catch (e) {
      console.warn('[Quotes] Subscription failed:', e.message);
    }
  },

  async fetchQuotes() {
    try {
      const symbolsParam = this.symbols.join(',');
      const url = '/proxy/api/tt/quotes-batch?symbols=' + encodeURIComponent(symbolsParam);
      console.log('[Quotes] Fetching:', url);

      const response = await fetch(url);
      console.log('[Quotes] Response status:', response.status);

      if (!response.ok) {
        console.warn('[Quotes] API returned:', response.status);
        return [];
      }

      const data = await response.json();
      console.log('[Quotes] Data received:', data);

      if (!Array.isArray(data)) {
        console.warn('[Quotes] Data is not array:', typeof data, data);
        return [];
      }

      return data;
    } catch (e) {
      console.error('[Quotes] Fetch failed:', e.message);
      return [];
    }
  },

  calculateChange(symbol, lastPrice) {
    const prevClose = this.prevCloses[symbol];
    if (!prevClose || prevClose === 0) return null;

    const change = lastPrice - prevClose;
    const changePercent = (change / prevClose) * 100;

    return {
      change: change.toFixed(2),
      changePercent: changePercent.toFixed(2),
      up: change > 0,
      down: change < 0
    };
  },

  formatPrice(price) {
    if (!price) return '—';
    return parseFloat(price).toFixed(2);
  },

  render() {
    const container = document.getElementById('quotes-container');
    if (!container) return;

    // Fetch and render quotes
    this.fetchQuotes().then(quotes => {
      if (!quotes || quotes.length === 0) {
        container.innerHTML = '<div class="quotes-empty">No quotes available</div>';
        return;
      }

      let rows = '';
      let visibleCount = 0;
      const searchVal = document.getElementById('quote-search')?.value.toUpperCase() || '';

      quotes.forEach(q => {
        if (!q || !q.symbol) return;

        const matches = searchVal === '' || q.symbol.toUpperCase().includes(searchVal);
        if (!matches) return;
        visibleCount++;

        const change = this.calculateChange(q.symbol, q.last);
        const changeClass = change ? (change.up ? 'up' : 'down') : '';
        const arrow = change ? (change.up ? '▲' : '▼') : '';
        const changeDisplay = change
          ? `<span class="${arrow ? 'quote-change-arrow' : ''}">${arrow}</span><span>${change.up ? '+' : ''}${change.changePercent}%</span>`
          : '—';

        rows += `
          <div class="quote-row">
            <div class="quote-symbol">${q.symbol}</div>
            <div class="quote-price">${this.formatPrice(q.last)}</div>
            <div class="quote-change ${changeClass}">
              ${changeDisplay}
            </div>
            <div class="quote-bid-ask">
              <span>B: ${this.formatPrice(q.bid)}</span>
              <span>A: ${this.formatPrice(q.ask)}</span>
            </div>
          </div>
        `;
      });

      const headerHtml = '<div class="quotes-header"><div>SYMBOL</div><div>PRICE</div><div>CHANGE</div><div>BID / ASK</div></div>';

      if (visibleCount === 0) {
        container.innerHTML = headerHtml + '<div class="quotes-empty">No matches found</div>';
      } else {
        container.innerHTML = headerHtml + rows;
      }
    });
  },

  filterQuotes(searchTerm) {
    this.render();
  }
};

// Wait for DOM ready and APIs
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', () => window.QuotesPanel.init());
} else {
  window.QuotesPanel.init();
}

function reloadQuotes() {
  window.QuotesPanel.render();
}
</script>
