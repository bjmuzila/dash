<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPX / GEX Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.5.0/dist/chart.umd.js" integrity="sha384-iU8HYtnGQ8Cy4zl7gbNMOhsDTTKX02BTXptVP/vqAWIaTfM7isw76iyZCsjL2eVi" crossorigin="anonymous"></script>
    <style>
        :root {
            color-scheme: light;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Courier New', monospace;
            background: #0a0e27;
            color: #e0e0e0;
            padding: 20px;
        }

        .dashboard {
            max-width: 100%;
            margin: 0 auto;
        }

        .header {
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .title {
            font-size: 20px;
            font-weight: bold;
        }

        .status {
            font-size: 11px;
            color: #666;
        }

        .status.connected {
            color: #2ecc71;
        }

        .status.error {
            color: #e74c3c;
        }

        .tabs {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            border-bottom: 1px solid #1a2050;
            padding-bottom: 10px;
        }

        .tab {
            padding: 8px 12px;
            cursor: pointer;
            font-size: 12px;
            color: #666;
            border: none;
            background: none;
            text-transform: uppercase;
        }

        .tab.active {
            color: #0099ff;
            border-bottom: 2px solid #0099ff;
            padding-bottom: 8px;
            margin-bottom: -10px;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .section {
            background: #0f1633;
            border: 1px solid #1a2050;
            border-radius: 4px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .section-title {
            font-size: 13px;
            font-weight: 600;
            color: #0099ff;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .chart-container {
            position: relative;
            height: 400px;
            margin-bottom: 20px;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .stat-box {
            background: #1a2050;
            padding: 12px;
            border-radius: 4px;
            text-align: center;
        }

        .stat-label {
            font-size: 10px;
            color: #888;
            margin-bottom: 6px;
            text-transform: uppercase;
        }

        .stat-value {
            font-size: 18px;
            font-weight: 600;
            color: #e0e0e0;
        }

        .stat-value.positive {
            color: #2ecc71;
        }

        .stat-value.negative {
            color: #e74c3c;
        }

        .loading {
            color: #0099ff;
            font-style: italic;
            text-align: center;
            padding: 20px;
        }

        .error-msg {
            background: #1a0000;
            color: #ff6b6b;
            padding: 10px;
            border-radius: 4px;
            margin-bottom: 10px;
            font-size: 11px;
        }

        .option-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 9px;
        }

        .option-table th {
            padding: 8px 4px;
            text-align: left;
            font-weight: 600;
            color: #666;
            border-bottom: 1px solid #1a2050;
        }

        .option-table td {
            padding: 6px 4px;
            border-bottom: 1px solid #1a2050;
            text-align: right;
        }

        .option-table td:first-child {
            text-align: left;
        }

        .option-table tr:hover {
            background: #1a2555;
        }

        .positive { color: #2ecc71; }
        .negative { color: #e74c3c; }
    </style>
</head>
<body>
    <div class="dashboard">
        <div class="header">
            <div class="title">SPX / GEX Dashboard (Live)</div>
            <div class="status" id="status">Connecting...</div>
        </div>

        <div id="error" style="display: none;"></div>

        <div class="tabs">
            <button class="tab active" onclick="switchTab('gex')">GEX Chart</button>
            <button class="tab" onclick="switchTab('chain')">GEX Chain</button>
        </div>

        <!-- GEX Chart Tab -->
        <div id="gex" class="tab-content active">
            <div class="section">
                <div class="section-title">SPX Gamma Exposure (GEX) - Live</div>
                <div class="stats">
                    <div class="stat-box">
                        <div class="stat-label">Current SPX</div>
                        <div class="stat-value" id="spotPrice">--</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-label">Net GEX ($B)</div>
                        <div class="stat-value" id="netGex">--</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-label">Call Wall</div>
                        <div class="stat-value" id="callWall">--</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-label">Put Wall</div>
                        <div class="stat-value" id="putWall">--</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-label">Zero Gamma</div>
                        <div class="stat-value" id="zeroGamma">--</div>
                    </div>
                </div>
                <div class="chart-container">
                    <canvas id="gexChart"></canvas>
                </div>
            </div>
        </div>

        <!-- GEX Chain Tab -->
        <div id="chain" class="tab-content">
            <div class="section">
                <div class="section-title">GEX By Strike</div>
                <div style="max-height: 600px; overflow-y: auto;">
                    <table class="option-table">
                        <thead>
                            <tr>
                                <th>Strike</th>
                                <th>Call Gamma</th>
                                <th>Call OI</th>
                                <th>Call GEX</th>
                                <th>Put Gamma</th>
                                <th>Put OI</th>
                                <th>Put GEX</th>
                                <th>Net GEX</th>
                            </tr>
                        </thead>
                        <tbody id="chainBody">
                            <tr><td colspan="8" class="loading">Loading GEX chain...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        const WS_URL = `ws://${window.location.hostname}:3001/ws/dxlink`;
        const API_BASE = `http://${window.location.hostname}:3001/proxy/api`;

        let ws = null;
        let gexChart = null;
        let gexByStrike = new Map();
        let spotPrice = 0;
        let dxGreeksData = {};

        function setStatus(msg, isError = false) {
            const el = document.getElementById('status');
            el.textContent = msg;
            el.className = 'status ' + (isError ? 'error' : msg === 'Connected' ? 'connected' : '');
        }

        function showError(msg) {
            const el = document.getElementById('error');
            el.textContent = msg;
            el.style.display = 'block';
            setStatus('Error', true);
        }

        function connectWebSocket() {
            setStatus('Connecting...');

            ws = new WebSocket(WS_URL);

            ws.onopen = () => {
                setStatus('Connected');
                // Request GEX chain data
                fetchGexChain();
            };

            ws.onmessage = (event) => {
                try {
                    const msg = JSON.parse(event.data);
                    handleDxMessage(msg);
                } catch (err) {
                    console.error('WebSocket parse error:', err);
                }
            };

            ws.onerror = (err) => {
                showError('WebSocket error: ' + err.message);
            };

            ws.onclose = () => {
                setStatus('Disconnected');
                setTimeout(connectWebSocket, 3000);
            };
        }

        function handleDxMessage(msg) {
            if (msg.type === 'FEED_DATA') {
                // Process Greeks from dxLink
                msg.data?.forEach(item => {
                    if (item.eventType === 'Greeks') {
                        dxGreeksData[item.eventSymbol] = item;
                    }
                });
                rebuildGexChart();
            }
        }

        async function fetchGexChain() {
            try {
                const resp = await fetch(`${API_BASE}/tt/gex-chain`);
                if (!resp.ok) throw new Error('GEX chain fetch failed');
                const data = await resp.json();

                spotPrice = data.spot || 0;
                document.getElementById('spotPrice').textContent = spotPrice.toFixed(2);
                document.getElementById('callWall').textContent = data.callWall || '--';
                document.getElementById('putWall').textContent = data.putWall || '--';
                document.getElementById('zeroGamma').textContent = (data.gexFlip || 0).toFixed(2);

                // Build GEX by strike
                gexByStrike.clear();
                if (data.rows) {
                    data.rows.forEach(row => {
                        gexByStrike.set(row.strike, row);
                    });
                }

                rebuildGexChart();
                updateChainTable();
            } catch (err) {
                console.error('fetchGexChain error:', err);
            }
        }

        function rebuildGexChart() {
            if (gexByStrike.size === 0) return;

            const strikes = [...gexByStrike.keys()].sort((a, b) => a - b);
            const gexValues = strikes.map(s => (gexByStrike.get(s).netGEX || 0) / 1e9);

            // Calculate total net GEX
            const totalGex = gexValues.reduce((a, b) => a + b, 0);
            const netGexEl = document.getElementById('netGex');
            netGexEl.textContent = totalGex.toFixed(2);
            netGexEl.className = 'stat-value ' + (totalGex >= 0 ? 'positive' : 'negative');

            const ctx = document.getElementById('gexChart');
            if (!ctx) return;

            if (gexChart) gexChart.destroy();

            gexChart = new Chart(ctx.getContext('2d'), {
                type: 'bar',
                data: {
                    labels: strikes,
                    datasets: [{
                        label: 'Net GEX ($B)',
                        data: gexValues,
                        backgroundColor: gexValues.map(v => v >= 0 ? '#2ecc71' : '#e74c3c')
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    indexAxis: 'x',
                    plugins: { legend: { labels: { color: '#888' } } },
                    scales: {
                        y: {
                            grid: { color: '#1a2050' },
                            ticks: { color: '#888' }
                        },
                        x: {
                            grid: { display: false },
                            ticks: { color: '#888' }
                        }
                    }
                }
            });
        }

        function updateChainTable() {
            const tbody = document.getElementById('chainBody');
            tbody.innerHTML = '';

            const strikes = [...gexByStrike.keys()].sort((a, b) => a - b);

            strikes.forEach(strike => {
                const row = gexByStrike.get(strike);
                const tr = document.createElement('tr');

                const netGexClass = row.netGEX >= 0 ? 'positive' : 'negative';

                tr.innerHTML = `
                    <td><strong>${strike}</strong></td>
                    <td>${(row.callGamma || 0).toFixed(6)}</td>
                    <td>${row.callOI || 0}</td>
                    <td class="positive">${(row.callGEX / 1e9 || 0).toFixed(2)}</td>
                    <td>${(row.putGamma || 0).toFixed(6)}</td>
                    <td>${row.putOI || 0}</td>
                    <td class="negative">${(row.putGEX / 1e9 || 0).toFixed(2)}</td>
                    <td class="${netGexClass}">${(row.netGEX / 1e9 || 0).toFixed(2)}</td>
                `;
                tbody.appendChild(tr);
            });
        }

        function switchTab(tabName) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));

            document.getElementById(tabName).classList.add('active');
            event.target.classList.add('active');

            if (tabName === 'gex' && gexChart) {
                setTimeout(() => gexChart.resize(), 100);
            }
        }

        // Initial connect
        connectWebSocket();

        // Refresh GEX chain every 5 seconds
        setInterval(fetchGexChain, 5000);
    </script>
</body>
</html>
