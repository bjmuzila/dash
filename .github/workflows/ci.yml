name: CI

# Gate PRs into main with typecheck, calc tests, and a security audit. The deploy
# (push.ps1 → VPS) is manual and independent of this run. Push triggers were
# removed 2026-06-30: direct pushes to main fired a failing run on every deploy
# (CI runs tsc directly, bypassing next.config's ignoreBuildErrors) and spammed
# failure emails. Runs on PRs only now; trigger manually via workflow_dispatch.
on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install deps
        # npm install (not npm ci): the lock file is generated on Windows and
        # does not satisfy `npm ci` on Linux (per-OS resolution of picomatch et
        # al.) — same reason the Dockerfile uses npm install. npm ci fails every
        # run here otherwise.
        run: npm install --no-audit --no-fund

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Unit tests (calculations, flow, esGapMath, server-v2)
        run: npm test

      # Fail the build on high/critical advisories. Does NOT block on
      # low/moderate (review those separately) to avoid noisy red builds.
      - name: Dependency audit (high+)
        run: npm audit --audit-level=high --omit=dev
        continue-on-error: false
