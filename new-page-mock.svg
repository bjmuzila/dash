      <stop offset="0%" stop-color="#219EBC" stop-opacity="0"/><stop offset="15%" stop-color="#219EBC" stop-opacity="0.12"/>
      <stop offset="50%" stop-color="#219EBC" stop-opacity="0.9"/><stop offset="85%" stop-color="#219EBC" stop-opacity="0.12"/><stop offset="100%" stop-color="#219EBC" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="dockBg" cx="50%" cy="0%" r="55%"><stop offset="0%" stop-color="#219EBC" stop-opacity="0.07"/><stop offset="100%" stop-color="#219EBC" stop-opacity="0"/></radialGradient>
    <!-- clip paths so each accent strip follows the card's 16px top radius -->
    <clipPath id="cHero"><rect x="36" y="96" width="1208" height="150" rx="16"/></clipPath>
    <clipPath id="cA"><rect x="36" y="270" width="392" height="120" rx="16"/></clipPath>
    <clipPath id="cB"><rect x="444" y="270" width="392" height="120" rx="16"/></clipPath>
    <clipPath id="cC"><rect x="852" y="270" width="392" height="120" rx="16"/></clipPath>
    <clipPath id="cTbl"><rect x="36" y="414" width="780" height="350" rx="16"/></clipPath>
    <clipPath id="cTrend"><rect x="832" y="414" width="412" height="350" rx="16"/></clipPath>
