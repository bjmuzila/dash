  <text x="60" y="184" fill="#FFFFFF" font-size="13" opacity="0.85">Accent strip now follows the card's 16px corner radius — borderTop on the rounded panel,</text>
  <text x="60" y="204" fill="#FFFFFF" font-size="13" opacity="0.85">not an overhanging square rect. All theme values come from homeTheme.ts.</text>
  <rect x="60" y="218" width="320" height="34" rx="6" fill="#000000" fill-opacity="0.4" stroke="#FFFFFF" stroke-opacity="0.10"/>
