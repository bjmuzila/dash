  <text x="856" y="448" fill="#FFFFFF" font-size="13" font-weight="800" letter-spacing="1.6">TREND</text>
  <text x="856" y="468" fill="#8ECAE6" font-size="12">Session intraday</text>
  <line x1="856" y1="710" x2="1220" y2="710" stroke="#FFFFFF" stroke-opacity="0.10"/>
  <line x1="856" y1="500" x2="856" y2="710" stroke="#FFFFFF" stroke-opacity="0.10"/>
  <path d="M856 660 L908 640 L960 668 L1012 600 L1064 612 L1116 560 L1168 540 L1220 512 L1220 710 L856 710 Z" fill="#219EBC" fill-opacity="0.12"/>
  <path d="M856 660 L908 640 L960 668 L1012 600 L1064 612 L1116 560 L1168 540 L1220 512" fill="none" stroke="#219EBC" stroke-width="2.5"/>
  <circle cx="1220" cy="512" r="4" fill="#8ECAE6"/>

  <text x="36" y="804" fill="#FFFFFF" font-size="11" opacity="0.4">Single source of truth: homeTheme.ts → palette · PageShell/Card · DOCK_THEME · homeToolbarAccentBar · homeRefreshButtonStyle</text>
  <text x="36" y="824" fill="#FFFFFF" font-size="11" opacity="0.3">Accents: cyan #219EBC · purple #126783 · orange #FB8501 · green #8ECAE6 — strips clipped to card radius</text>

  <!-- ===== open frosted-dock dropdown — drawn LAST so it sits on top, fully
       opaque. In the live app: blur(18px) + zIndex 100000. ===== -->
  <g>
    <rect x="14" y="74" width="240" height="172" rx="16" fill="#080B11"/>
    <rect x="14" y="74" width="240" height="172" rx="16" fill="url(#dockBg)"/>
    <rect x="14" y="74" width="240" height="172" rx="16" fill="none" stroke="#FFFFFF" stroke-opacity="0.12"/>
    <rect x="14" y="74" width="240" height="2" fill="#219EBC" fill-opacity="0.5"/>
    <rect x="22" y="84" width="224" height="34" rx="10" fill="#15303a" stroke="#219EBC" stroke-opacity="0.30"/>
    <text x="38" y="106" fill="#8ECAE6" font-size="14" font-weight="700">⌂  Home</text>
    <text x="38" y="140" fill="#FFFFFF" font-size="14">⊞  Traders Dashboard</text>
    <text x="38" y="170" fill="#FFFFFF" font-size="14">↔  Estimated Moves</text>
    <rect x="22" y="180" width="224" height="30" rx="9" fill="#102229"/>
    <text x="38" y="200" fill="#FFFFFF" font-size="14">▦  Analytics</text>
    <text x="38" y="230" fill="#FFFFFF" font-size="14">⑊  ES Candles</text>
  </g>
