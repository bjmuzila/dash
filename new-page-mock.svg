  <g stroke="#FFFFFF" stroke-width="2" stroke-linecap="round"><line x1="26" y1="26" x2="44" y2="26"/><line x1="26" y1="32" x2="44" y2="32"/><line x1="26" y1="38" x2="44" y2="38"/></g>
