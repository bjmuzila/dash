  <rect x="36" y="96" width="1208" height="150" rx="16" fill="none" stroke="#FFFFFF" stroke-opacity="0.10"/>
  <text x="60" y="130" fill="#FFFFFF" font-size="13" font-weight="800" letter-spacing="1.6">OVERVIEW</text>
