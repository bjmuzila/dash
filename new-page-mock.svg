<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="860" viewBox="0 0 1280 860" font-family="Inter, 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <radialGradient id="shellL" cx="15%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#219EBC" stop-opacity="0.04"/><stop offset="100%" stop-color="#219EBC" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="shellR" cx="85%" cy="30%" r="50%">
      <stop offset="0%" stop-color="#126783" stop-opacity="0.05"/><stop offset="100%" stop-color="#126783" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowCyan" cx="50%" cy="0%" r="60%"><stop offset="0%" stop-color="#219EBC" stop-opacity="0.10"/><stop offset="100%" stop-color="#219EBC" stop-opacity="0"/></radialGradient>
    <radialGradient id="glowOrange" cx="50%" cy="0%" r="60%"><stop offset="0%" stop-color="#FB8501" stop-opacity="0.10"/><stop offset="100%" stop-color="#FB8501" stop-opacity="0"/></radialGradient>
    <radialGradient id="glowGreen" cx="50%" cy="0%" r="60%"><stop offset="0%" stop-color="#8ECAE6" stop-opacity="0.10"/><stop offset="100%" stop-color="#8ECAE6" stop-opacity="0"/></radialGradient>
    <radialGradient id="glowPurple" cx="50%" cy="0%" r="60%"><stop offset="0%" stop-color="#126783" stop-opacity="0.12"/><stop offset="100%" stop-color="#126783" stop-opacity="0"/></radialGradient>
