    <line x1="60" y1="562" x2="792" y2="562" stroke="#FFFFFF" stroke-opacity="0.06"/>
    <text x="60" y="588">NDX</text><text x="320" y="588">24,118.7</text><text x="540" y="588" fill="#8ECAE6">+0.41%</text><rect x="720" y="576" width="52" height="18" rx="9" fill="#8ECAE6" fill-opacity="0.15"/><text x="746" y="589" fill="#8ECAE6" font-size="10" text-anchor="middle">OK</text>
    <line x1="60" y1="602" x2="792" y2="602" stroke="#FFFFFF" stroke-opacity="0.06"/>
    <text x="60" y="628">ES</text><text x="320" y="628">7,520.25</text><text x="540" y="628" fill="#EF4444">−0.18%</text><rect x="720" y="616" width="62" height="18" rx="9" fill="#FB8501" fill-opacity="0.15"/><text x="751" y="629" fill="#FB8501" font-size="10" text-anchor="middle">WATCH</text>
    <line x1="60" y1="642" x2="792" y2="642" stroke="#FFFFFF" stroke-opacity="0.06"/>
    <text x="60" y="668">VIX</text><text x="320" y="668">13.84</text><text x="540" y="668" fill="#EF4444">−2.10%</text><rect x="720" y="656" width="52" height="18" rx="9" fill="#8ECAE6" fill-opacity="0.15"/><text x="746" y="669" fill="#8ECAE6" font-size="10" text-anchor="middle">OK</text>
    <line x1="60" y1="682" x2="792" y2="682" stroke="#FFFFFF" stroke-opacity="0.06"/>
    <text x="60" y="708">RTY</text><text x="320" y="708">2,310.9</text><text x="540" y="708" fill="#8ECAE6">+0.88%</text><rect x="720" y="696" width="52" height="18" rx="9" fill="#8ECAE6" fill-opacity="0.15"/><text x="746" y="709" fill="#8ECAE6" font-size="10" text-anchor="middle">OK</text>
  </g>

