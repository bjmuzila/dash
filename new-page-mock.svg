  <text x="60" y="356" fill="#FFFFFF" font-size="34" font-weight="800">1,284</text>
  <text x="60" y="378" fill="#8ECAE6" font-size="12">+12.4% vs prior</text>

  <g clip-path="url(#cB)"><rect x="444" y="270" width="392" height="120" fill="#0D1119" fill-opacity="0.45"/><rect x="444" y="270" width="392" height="120" fill="url(#glowGreen)"/><rect x="444" y="270" width="392" height="2" fill="#8ECAE6" fill-opacity="0.6"/></g>
