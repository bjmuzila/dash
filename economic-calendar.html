<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Economic Calendar</title>
  <style>
    :root {
      --bg0:#080c10;--bg1:#0d1117;--bg2:#111822;--bg3:#1a2233;--bg4:#1f2d42;
      --border:#1e3050;--border2:#2a4060;
      --text0:#e8edf5;--text1:#a8b8cc;--text2:#5a7a99;--text3:#3a5570;
      --green:#00e676;--green2:#1fae5e;--red:#ff4757;--red2:#cc2233;
      --amber:#ffb300;--blue:#29b6f6;--cyan:#00e5ff;--purple:#7c4dff;
      --mono:Arial,sans-serif;--sans:Arial,sans-serif;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: var(--bg0);
      color: var(--text0);
      font-family: Arial, sans-serif;
      font-size: 14px;
    }

    .calendar-container {
      max-width: 1000px;
      margin: 0 auto;
      padding: 24px;
    }

    .date-section {
      text-align: center;
      margin-bottom: 32px;
      padding-bottom: 16px;
      border-bottom: 2px solid var(--border2);
    }

    .today-date {
      font-size: 32px;
      font-weight: 700;
      color: var(--cyan);
      letter-spacing: .08em;
      margin-bottom: 8px;
    }

    .quote-section {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-left: 3px solid var(--amber);
      border-radius: 2px;
      padding: 20px 24px;
      margin-bottom: 32px;
    }

    .quote-text {
      font-size: 16px;
      line-height: 1.6;
      color: var(--text0);
      font-style: italic;
    }

    .events-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 18px;
      font-weight: 700;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--text0);
      margin-bottom: 16px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border2);
    }

    .event-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 2px;
      padding: 16px;
      margin-bottom: 12px;
      display: flex;
      gap: 16px;
      align-items: flex-start;
      transition: background .15s;
    }

    .event-card:hover {
      background: var(--bg3);
    }

    .event-time {
      font-size: 14px;
      font-weight: 700;
      color: var(--cyan);
      font-family: Consolas, monospace;
      flex-shrink: 0;
      min-width: 70px;
    }

    .event-details {
      flex: 1;
    }

    .event-title {
      font-size: 14px;
      font-weight: 700;
      color: var(--text0);
      margin-bottom: 4px;
    }

    .event-impact {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 2px;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: .08em;
      text-transform: uppercase;
      margin-right: 8px;
    }

    .impact-high {
      background: rgba(255, 71, 87, 0.15);
      color: var(--red);
      border: 1px solid rgba(255, 71, 87, 0.3);
    }

    .impact-medium {
      background: rgba(255, 179, 0, 0.15);
      color: var(--amber);
      border: 1px solid rgba(255, 179, 0, 0.3);
    }

    .impact-low {
      background: rgba(0, 230, 118, 0.15);
      color: var(--green);
      border: 1px solid rgba(0, 230, 118, 0.3);
    }

    .event-country {
      font-size: 11px;
      color: var(--text2);
      letter-spacing: .05em;
    }

    .event-values {
      margin-top: 8px;
      padding-top: 8px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 20px;
      font-size: 12px;
      font-family: Consolas, monospace;
    }

    .value-item {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .value-label {
      font-size: 9px;
      color: var(--text3);
      text-transform: uppercase;
      letter-spacing: .1em;
    }

    .value-number {
      color: var(--text0);
      font-weight: 700;
    }

    .event-countdown {
      color: var(--amber);
      font-size: 12px;
      font-weight: 700;
      font-family: Consolas, monospace;
      flex-shrink: 0;
    }

    body.hide-countdown .event-countdown {
      display: none;
    }
  </style>
</head>
<body>
  <div class="calendar-container">
    <!-- TODAY'S DATE -->
    <div class="date-section">
      <div class="today-date" id="todayDate">LOADING...</div>
    </div>

    <!-- QUOTE -->
    <div class="quote-section">
      <div class="quote-text" id="quote">Loading quote from Google Sheets...</div>
    </div>

    <!-- ECONOMIC EVENTS -->
    <div class="events-header">
      <div style="display:flex;justify-content:space-between;align-items:center;">
        <span>Economic Events</span>
        <div style="display:flex;gap:2px;background:#070c14;border-radius:2px;padding:2px">
          <button id="cal-copy-shot-btn" onclick="copyCalendarScreenshot()" title="Copy calendar screenshot" style="font-size:9px;padding:2px 8px;border:none;border-radius:2px;background:transparent;color:#00e5ff;cursor:pointer;font-family:Arial;font-weight:700">COPY</button>
          <button id="cal-share-x-btn" onclick="shareCalendar('x')" title="Copy screenshot and open X share" style="font-size:9px;padding:2px 8px;border:none;border-radius:2px;background:transparent;color:#00e5ff;cursor:pointer;font-family:Arial;font-weight:700">X</button>
          <button id="cal-share-discord-btn" onclick="shareCalendar('discord')" title="Copy screenshot and open Discord" style="font-size:9px;padding:2px 8px;border:none;border-radius:2px;background:transparent;color:#7289da;cursor:pointer;font-family:Arial;font-weight:700">DISCORD</button>
        </div>
      </div>
    </div>
    <div id="eventsContainer">
      <!-- Sample Event Structure -->
      <div class="event-card">
        <div class="event-time">09:30 AM</div>
        <div class="event-details">
          <div>
            <span class="event-impact impact-high">High</span>
            <span class="event-country">🇺🇸 USD</span>
          </div>
          <div class="event-title">Non-Farm Payrolls</div>
          <div class="event-values">
            <div class="value-item">
              <span class="value-label">Actual</span>
              <span class="value-number">187K</span>
            </div>
            <div class="value-item">
              <span class="value-label">Forecast</span>
              <span class="value-number">200K</span>
            </div>
            <div class="value-item">
              <span class="value-label">Previous</span>
              <span class="value-number">209K</span>
            </div>
          </div>
        </div>
      </div>

      <!-- Add more events dynamically -->
    </div>
  </div>

  <script>
    // Set today's date
    const today = new Date();
    const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
    document.getElementById('todayDate').textContent = today.toLocaleDateString('en-US', options).toUpperCase();

    // Fetch quote from Google Sheets
    async function fetchQuote() {
      const SHEET_ID = '1NzeEb9KZgQQLIFkQ0ipxDPM2zQDBO1Yy-0As7O5q9Vg';
      const SHEET_NAME = 'Quote';
      const API_KEY = 'YOUR_GOOGLE_SHEETS_API_KEY'; // Add your API key here
      
      const url = `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${SHEET_NAME}!A:B?key=${API_KEY}`;
      
      try {
        const response = await fetch(url);
        const data = await response.json();
        
        // Format today's date to match sheet format (M/D/YYYY)
        const today = new Date();
        const dateStr = `${today.getMonth() + 1}/${today.getDate()}/${today.getFullYear()}`;
        
        // Find matching row
        const rows = data.values || [];
        const match = rows.find(row => row[0] === dateStr);
        
        if (match && match[1]) {
          document.getElementById('quote').textContent = match[1];
        } else {
          document.getElementById('quote').textContent = 'No quote available for today';
        }
      } catch (error) {
        console.error('Error fetching quote:', error);
        document.getElementById('quote').textContent = 'Error loading quote';
      }
    }

    // Fetch economic events
    async function fetchEvents() {
      // Replace with your economic calendar API endpoint
      const EVENTS_URL = 'YOUR_ECONOMIC_CALENDAR_API_ENDPOINT';
      
      try {
        const response = await fetch(EVENTS_URL);
        const events = await response.json();
        renderEvents(events);
      } catch (error) {
        console.error('Error fetching events:', error);
      }
    }

    function renderEvents(events) {
      const container = document.getElementById('eventsContainer');
      container.innerHTML = ''; // Clear sample
      
      events.forEach(event => {
        const card = document.createElement('div');
        card.className = 'event-card';
        
        const impactClass = event.impact === 'High' ? 'impact-high' : 
                           event.impact === 'Medium' ? 'impact-medium' : 'impact-low';
        
        card.innerHTML = `
          <div class="event-time">${event.time}</div>
          <div class="event-details">
            <div>
              <span class="event-impact ${impactClass}">${event.impact}</span>
              <span class="event-country">${event.country}</span>
            </div>
            <div class="event-title">${event.title}</div>
            ${event.actual || event.forecast || event.previous ? `
              <div class="event-values">
                ${event.actual ? `<div class="value-item">
                  <span class="value-label">Actual</span>
                  <span class="value-number">${event.actual}</span>
                </div>` : ''}
                ${event.forecast ? `<div class="value-item">
                  <span class="value-label">Forecast</span>
                  <span class="value-number">${event.forecast}</span>
                </div>` : ''}
                ${event.previous ? `<div class="value-item">
                  <span class="value-label">Previous</span>
                  <span class="value-number">${event.previous}</span>
                </div>` : ''}
              </div>
            ` : ''}
          </div>
        `;
        
        container.appendChild(card);
      });
    }

    // Initialize
    fetchQuote();
    // fetchEvents();

    const DISCORD_WEBHOOK_URL = '/proxy/api/webhooks/1466249857122570454/REDACTED';

    // Format calendar data as text template
    function formatCalendarTemplate() {
      const today = new Date();
      const dateStr = today.toLocaleDateString('en-US', { 
        weekday: 'long', 
        year: 'numeric', 
        month: 'long', 
        day: 'numeric' 
      }).toUpperCase();
      
      const quoteText = document.getElementById('quote').textContent;
      
      // Get all events from the DOM
      const eventCards = document.querySelectorAll('.event-card');
      let eventsText = '';
      
      eventCards.forEach(card => {
        const time = card.querySelector('.event-time')?.textContent || '';
        const title = card.querySelector('.event-title')?.textContent || '';
        const impact = card.querySelector('.event-impact')?.textContent || '';
        const country = card.querySelector('.event-country')?.textContent || '';
        
        const values = card.querySelectorAll('.value-item');
        let valuesText = '';
        values.forEach(v => {
          const label = v.querySelector('.value-label')?.textContent || '';
          const number = v.querySelector('.value-number')?.textContent || '';
          if (label && number) {
            valuesText += `${label}: ${number}  `;
          }
        });
        
        eventsText += `${time} | ${impact} | ${country}\n${title}\n${valuesText}\n\n`;
      });
      
      // Build template
      const template = `${dateStr}

${quoteText}

ECONOMIC EVENTS
${eventsText.trim() || 'No events scheduled'}`;
      
      return template;
    }

    // Copy calendar template to clipboard (text, not screenshot)
    async function copyCalendarScreenshot() {
      const btn = document.getElementById('cal-copy-shot-btn');
      if (btn) { btn.textContent = '…'; btn.style.color = '#ffb300'; }
      
      try {
        // Hide countdown via parent window
        if (window.parent.toggleEconCountdownVisibility) {
          window.parent.toggleEconCountdownVisibility(true);
        }
        
        const template = formatCalendarTemplate();
        await navigator.clipboard.writeText(template);
        
        // Restore countdown
        if (window.parent.toggleEconCountdownVisibility) {
          window.parent.toggleEconCountdownVisibility(false);
        }
        
        if (btn) {
          btn.textContent = '✓';
          btn.style.color = '#00e676';
          setTimeout(() => {
            btn.textContent = 'COPY';
            btn.style.color = '#00e5ff';
          }, 1500);
        }
      } catch (e) {
        console.error('Copy error:', e);
        if (window.parent.toggleEconCountdownVisibility) {
          window.parent.toggleEconCountdownVisibility(false);
        }
        if (btn) {
          btn.textContent = 'ERR';
          btn.style.color = '#ff4757';
          setTimeout(() => {
            btn.textContent = 'COPY';
            btn.style.color = '#00e5ff';
          }, 1500);
        }
      }
    }

    // Load html2canvas dynamically
    let html2canvasPromise = null;
    function loadHtml2Canvas() {
      if (typeof html2canvas !== 'undefined') return Promise.resolve(html2canvas);
      if (html2canvasPromise) return html2canvasPromise;
      html2canvasPromise = new Promise((resolve, reject) => {
        const script = document.createElement('script');
        script.src = 'https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js';
        script.async = true;
        script.onload = () => resolve(window.html2canvas);
        script.onerror = () => reject(new Error('html2canvas failed to load'));
        document.head.appendChild(script);
      });
      return html2canvasPromise;
    }

    // Capture calendar as blob for Discord
    async function captureCalendarBlob() {
      const container = document.querySelector('.calendar-container');
      if (!container) throw new Error('Calendar container not found');
      
      await loadHtml2Canvas();
      const canvas = await html2canvas(container, {
        backgroundColor: '#080c10',
        scale: 2,
        useCORS: true,
        logging: false
      });
      
      return new Promise(resolve => {
        canvas.toBlob(blob => resolve(blob), 'image/png');
      });
    }

    // Share calendar to X or Discord
    async function shareCalendar(platform) {
      const btn = platform === 'x' ? 
        document.getElementById('cal-share-x-btn') : 
        document.getElementById('cal-share-discord-btn');
      
      const orig = btn ? btn.textContent : '';
      if (btn) { btn.textContent = '…'; btn.style.color = '#ffb300'; }
      
      // Hide countdown - try both window.top and window.parent
      const hideCountdown = () => {
        if (window.parent && window.parent.toggleEconCountdownVisibility) {
          window.parent.toggleEconCountdownVisibility(true);
        } else if (window.top && window.top.toggleEconCountdownVisibility) {
          window.top.toggleEconCountdownVisibility(true);
        } else if (typeof toggleEconCountdownVisibility !== 'undefined') {
          toggleEconCountdownVisibility(true);
        }
      };
      
      const showCountdown = () => {
        if (window.parent && window.parent.toggleEconCountdownVisibility) {
          window.parent.toggleEconCountdownVisibility(false);
        } else if (window.top && window.top.toggleEconCountdownVisibility) {
          window.top.toggleEconCountdownVisibility(false);
        } else if (typeof toggleEconCountdownVisibility !== 'undefined') {
          toggleEconCountdownVisibility(false);
        }
      };
      
      try {
        if (platform === 'x') {
          hideCountdown();
          setTimeout(() => {
            showCountdown();
            if (btn) {
              btn.textContent = orig;
              btn.style.color = '#00e5ff';
            }
            window.open('https://twitter.com/intent/tweet?text=Economic%20Calendar', '_blank');
          }, 100);
          return;
        }
        
        // Discord: send text template via webhook
        hideCountdown();
        
        const template = formatCalendarTemplate();
        
        const payload = JSON.stringify({
          content: template
        });
        
        const response = await fetch(DISCORD_WEBHOOK_URL, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: payload
        });
        
        showCountdown();
        
        if (!response.ok) {
          throw new Error(`Discord webhook failed: ${response.status}`);
        }
        
        if (btn) {
          btn.textContent = '✓';
          btn.style.color = '#00e676';
          setTimeout(() => {
            btn.textContent = orig;
            btn.style.color = '#7289da';
          }, 1500);
        }
      } catch (e) {
        console.error('Discord share error:', e);
        showCountdown();
        if (btn) {
          btn.textContent = 'ERR';
          btn.style.color = '#ff4757';
          setTimeout(() => {
            btn.textContent = orig;
            btn.style.color = '#7289da';
          }, 1500);
        }
      }
    }
  </script>
</body>
</html>
