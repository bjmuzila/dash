<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPX / GEX Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.5.0/dist/chart.umd.js" integrity="sha384-iU8HYtnGQ8Cy4zl7gbNMOhsDTTKX02BTXptVP/vqAWIaTfM7isw76iyZCsjL2eVi" crossorigin="anonymous"></script>
    <style>
        :root {
            color-scheme: light;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Courier New', monospace;
            background: #0a0e27;
            color: #e0e0e0;
            padding: 20px;
        }

        .dashboard {
            max-width: 100%;
            margin: 0 auto;
        }

        .header {
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .title {
            font-size: 20px;
            font-weight: bold;
        }

        .tabs {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            border-bottom: 1px solid #1a2050;
            padding-bottom: 10px;
        }

        .tab {
            padding: 8px 12px;
            cursor: pointer;
            font-size: 12px;
            color: #666;
            border: none;
            background: none;
            text-transform: uppercase;
        }

        .tab.active {
            color: #0099ff;
            border-bottom: 2px solid #0099ff;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .option-chain {
            background: #0f1633;
            border: 1px solid #1a2050;
            border-radius: 4px;
            padding: 0;
            max-height: 600px;
            overflow-y: auto;
        }

        .option-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 11px;
        }

        .option-table thead {
            position: sticky;
            top: 0;
            background: #0f1633;
            z-index: 10;
        }

        .option-table th {
            padding: 10px 6px;
            text-align: left;
            font-weight: 600;
            color: #888;
            border-bottom: 1px solid #1a2050;
            text-transform: uppercase;
            font-size: 10px;
        }

        .option-table td {
            padding: 8px 6px;
            border-bottom: 1px solid #1a2050;
            text-align: right;
        }

        .option-table td:first-child {
            text-align: left;
        }

        .option-table tr:hover {
            background: #1a2555;
        }

        .symbol {
            color: #e0e0e0;
            font-weight: 600;
            text-align: left;
        }

        .call-symbol {
            color: #0099ff;
        }

        .put-symbol {
            color: #ff6b6b;
        }

        .positive {
            color: #2ecc71;
        }

        .negative {
            color: #e74c3c;
        }

        .neutral {
            color: #888;
        }

        .gex-chart {
            background: #0f1633;
            border: 1px solid #1a2050;
            border-radius: 4px;
            padding: 20px;
        }

        .chart-container {
            position: relative;
            height: 400px;
            margin-bottom: 20px;
        }

        .gex-title {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 20px;
            color: #0099ff;
        }

        .gex-info {
            display: flex;
            gap: 40px;
            margin-bottom: 20px;
            font-size: 12px;
        }

        .gex-stat {
            display: flex;
            flex-direction: column;
        }

        .gex-stat-label {
            color: #888;
            font-size: 10px;
            text-transform: uppercase;
            margin-bottom: 4px;
        }

        .gex-stat-value {
            font-weight: 600;
            font-size: 14px;
        }

        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #0f1633;
        }

        ::-webkit-scrollbar-thumb {
            background: #1a2050;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #2a3a60;
        }
    </style>
</head>
<body>

            <div class="title">SPX / GEX Dashboard</div>
            <div style="font-size: 12px; color: #888;" id="timestamp"></div>
        </div>

        <div class="tabs">
            <button class="tab active" onclick="switchTab('chain')">Option Chain</button>
            <button class="tab" onclick="switchTab('gex')">GEX Chart</button>
            <button class="tab" onclick="switchTab('bars')">Bars</button>
            <button class="tab" onclick="switchTab('netgex')">Net GEX</button>
        </div>

        <!-- Option Chain Tab -->
        <div id="chain" class="tab-content active">
            <div class="option-chain">
                <table class="option-table">
                    <thead>
                        <tr>
                            <th>Symbol</th>
                            <th>OI</th>
                            <th>Vol</th>
                            <th>Bid</th>
                            <th>Ask</th>
                            <th>Last</th>
                            <th>Mid</th>
                            <th>IV</th>
                            <th>Δ</th>
                            <th>Net GEX</th>
                            <th>Net DEX</th>
                            <th>Net CHEX</th>
                            <th>Net VEX</th>
                            <th>Strike</th>
                            <th>Δ</th>
                            <th>IV</th>
                            <th>Mid</th>
                            <th>Last</th>
                            <th>Bid</th>
                            <th>Ask</th>
                            <th>Vol</th>
                            <th>OI</th>
                            <th>Symbol</th>
                        </tr>
                    </thead>
                    <tbody id="chainBody">
                    </tbody>
                </table>
            </div>
        </div>

        <!-- GEX Chart Tab -->
        <div id="gex" class="tab-content">
            <div class="gex-chart">
                <div class="gex-title">SPX Gamma Exposure (GEX)</div>
                <div class="gex-info">
                    <div class="gex-stat">
                        <div class="gex-stat-label">Current SPX</div>
                        <div class="gex-stat-value">7,465</div>
                    </div>
                    <div class="gex-stat">
                        <div class="gex-stat-label">Total GEX</div>
                        <div class="gex-stat-value positive">+$219.89M</div>
                    </div>
                    <div class="gex-stat">
                        <div class="gex-stat-label">Avg 2M</div>
                        <div class="gex-stat-value">$0</div>
                    </div>
                </div>
                <div class="chart-container">
                    <canvas id="gexChart"></canvas>
                </div>
            </div>
        </div>

        <!-- Bars Tab -->
        <div id="bars" class="tab-content">
            <div class="gex-chart">
                <div class="gex-title">GEX by Strike (Bar View)</div>
                <div class="chart-container">
                    <canvas id="barsChart"></canvas>
                </div>
            </div>
        </div>

        <!-- Net GEX Tab -->
        <div id="netgex" class="tab-content">
            <div class="gex-chart">

                                <th>Call Vol</th>

                            </tr>
                        </thead>
                        <tbody id="netgexBody">
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

            { symbol: '7425', oi: 426, vol: 426, bid: 22.40, ask: 22.60, last: 23.70, mid: 22.50, iv: 25.1, delta: 0.8405, netgex: '+$102.37M', netdex: '+$106.00M', netchex: '+$6276.56M', netvex: '+$335.85M', strike: 7425, putdelta: -0.596, putiv: 25.1, putmid: 41.80, putlast: 46.80, putbid: 41.70, putask: 41.90, putvol: 49, putoi: 0, putsymbol: '7425P' },

            { strike: 7780, gex: 0, call: 0, put: 0 },
            { strike: 7800, gex: 0, call: 0, put: 0 },
        ];

        function updateTimestamp() {
            document.getElementById('timestamp').textContent = new Date().toLocaleString();
        }
        updateTimestamp();

        function switchTab(tabName) {
            // Hide all tabs
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));

            // Show selected tab
            document.getElementById(tabName).classList.add('active');
            event.target.classList.add('active');

            // Initialize charts if needed
            if (tabName === 'gex') {
                setTimeout(() => gexChart && gexChart.resize(), 100);
            }
            if (tabName === 'bars') {
                setTimeout(() => barsChart && barsChart.resize(), 100);
            }
        }

        // Populate option chain
        function populateChain() {
            const tbody = document.getElementById('chainBody');
            optionData.forEach(row => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td class="symbol call-symbol">${row.symbol}C</td>
                    <td>${row.oi}</td>
                    <td>${row.vol}</td>
                    <td>${row.bid.toFixed(2)}</td>
                    <td>${row.ask.toFixed(2)}</td>
                    <td>${row.last.toFixed(2)}</td>
                    <td>${row.mid.toFixed(2)}</td>
                    <td>${row.iv.toFixed(1)}</td>
                    <td class="positive">+${(row.delta * 100).toFixed(2)}</td>
                    <td class="positive">${row.netgex}</td>
                    <td>${row.netdex}</td>
                    <td class="positive">${row.netchex}</td>
                    <td class="positive">${row.netvex}</td>
                    <td class="symbol">${row.strike}</td>
                    <td class="negative">${(row.putdelta * 100).toFixed(2)}</td>
                    <td>${row.putiv.toFixed(1)}</td>
                    <td>${row.putmid.toFixed(2)}</td>
                    <td>${row.putlast.toFixed(2)}</td>
                    <td>${row.putbid.toFixed(2)}</td>
                    <td>${row.putask.toFixed(2)}</td>
                    <td>${row.putvol}</td>
                    <td>${row.putoi}</td>
                    <td class="symbol put-symbol">${row.putsymbol}</td>
                `;
                tbody.appendChild(tr);
            });
        }

        // Populate Net GEX table
        function populateNetGEX() {
            const tbody = document.getElementById('netgexBody');
            gexData.forEach(row => {
                const tr = document.createElement('tr');
                const gexClass = row.gex > 0 ? 'positive' : row.gex < 0 ? 'negative' : 'neutral';
                tr.innerHTML = `
                    <td class="symbol">${row.strike}</td>
                    <td class="${gexClass}">${row.gex > 0 ? '+' : ''}${row.gex}M</td>
                    <td class="positive">${row.call > 0 ? '+' : ''}${row.call}M</td>
                    <td class="negative">${row.put > 0 ? '+' : ''}${row.put}M</td>
                    <td>${Math.abs(row.call)}</td>
                    <td>${Math.abs(row.put)}</td>
                `;
                tbody.appendChild(tr);
            });
        }

        populateChain();
        populateNetGEX();

        // GEX Line Chart
        const gexCtx = document.getElementById('gexChart').getContext('2d');
        const gexChart = new Chart(gexCtx, {
            type: 'line',
            data: {
                labels: gexData.map(d => d.strike),
                datasets: [

                        label: 'Net GEX',
                        data: gexData.map(d => d.gex),
                        borderColor: '#0099ff',
                        backgroundColor: 'rgba(0, 153, 255, 0.1)',

                        fill: false,

                scales: {
                    y: {
                        grid: { color: '#1a2050' },
                        ticks: { color: '#888' }
                    },
                    x: {
                        grid: { display: false },
                        ticks: { color: '#888', maxRotation: 45 }
                    }

        // GEX Bar Chart
        const barsCtx = document.getElementById('barsChart').getContext('2d');
        const barsChart = new Chart(barsCtx, {
            type: 'bar',
            data: {
                labels: gexData.map(d => d.strike),
                datasets: [{
                    label: 'Net GEX',
                    data: gexData.map(d => d.gex),
                    backgroundColor: gexData.map(d => d.gex > 0 ? '#2ecc71' : '#e74c3c')

            options: {
                responsive: true,
                maintainAspectRatio: false,
                indexAxis: 'x',
                plugins: {
                    legend: { labels: { color: '#888' } }
                },
                scales: {

                        ticks: { color: '#888' }
                    },
                    x: {
                        grid: { display: false },

    </script>
</body>
</html>
