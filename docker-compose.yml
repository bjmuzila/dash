services:
  dashboard:
    build:
      context: .
      args:
        # NEXT_PUBLIC_* are inlined into the client bundle at BUILD time.
        # Set this in .env (compose reads it) so the owner-only UI works.
        NEXT_PUBLIC_OWNER_USER_ID: ${NEXT_PUBLIC_OWNER_USER_ID:-}
        # Supabase client keys are inlined at BUILD time (auth + subscriber /chat).
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL:-}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY:-}
    image: bzila-dashboard:latest
    restart: unless-stopped
    # server-v2 reads .env.local at boot (dotenv override:true). Mount your real
    # secrets file there. Keep PORT here in sync with the EXPOSE/healthcheck.
    env_file:
      # .env.local is the single source of truth for PORT and all secrets
      # (server-v2 loads it with dotenv override:true). Next's rewrite also reads
      # process.env.PORT, so the in-process loopback always matches. Set
      # APP_PORT below to whatever PORT you put in .env.local (3001 or 3002).
      - .env.local
    environment:
      NODE_ENV: production
      TZ: America/New_York
    ports:
      # Bind to localhost only — Cloudflare reaches the origin via cloudflared
      # tunnel (no public port). Do NOT expose to 0.0.0.0 without TLS+firewall.
      # APP_PORT must equal PORT in .env.local. See DEPLOY_CLOUDFLARE.md.
      - "127.0.0.1:${APP_PORT:-3001}:${APP_PORT:-3001}"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:'+(process.env.PORT||'3001')+'/proxy/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s
    # Wait for Theta (sibling service in the same compose project) to report
    # healthy before the dashboard boots — kills the cold-start race where the
    # feed starts before Theta is reachable ("Feed failed to start: fetch failed"
    # → spot:0 → cold first load). Theta's healthcheck lives in
    # deploy/theta/compose.theta.yml.
    depends_on:
      theta-terminal:
        condition: service_healthy

  # Theta Terminal (options/index data source). Previously run standalone via
  # `docker run` on the VPS, which left it with NO JVM heap cap → it OOM'd on the
  # default heap mid-session and greeks coverage collapsed (see
  # theta-terminal-oom-heap). Defined here so a single `docker compose up -d`
  # brings it up WITH the heap cap + memory backstop every time.
  theta-terminal:
    build:
      context: .
      dockerfile: deploy/theta/Dockerfile.theta
    image: dashboard-theta-terminal
    container_name: theta-terminal
    restart: unless-stopped
    # Read the Theta key (and the rest) from .env.local directly — the
    # `environment:` interpolation form pulls from compose's .env/shell, NOT
    # .env.local, so env_file is required for the Terminal to see the key.
    env_file:
      - .env.local
    environment:
      # Cap the JVM heap so the Terminal garbage-collects instead of OOM-ing.
      # ~1.5g heap under a 2g container limit leaves headroom for non-heap/JVM
      # overhead. Drop to -Xmx1024m if the box is RAM-tight (check `free -m`).
      JAVA_TOOL_OPTIONS: -Xmx1500m
    # Hard memory backstop. If the JVM ever blows past the heap cap, the kernel
    # OOM-kills just this container (restart: unless-stopped brings it back)
    # instead of the whole box going into swap-death.
    mem_limit: 2g
    # Publish to host loopback so an SSH tunnel (local dev) and host curl reach a
    # STABLE address. 25503 = REST, 25520 = live event stream. Loopback-only.
    ports:
      - "127.0.0.1:25503:25503"
      - "127.0.0.1:25520:25520"
    healthcheck:
      # The bare REST root returns 410 Gone (v3 endpoints live under /v3/...), so
      # a 200-only check marks the container unhealthy FOREVER even while it
      # serves data — which deadlocks the dashboard's depends_on gate and takes
      # the site down. Instead just confirm the REST port ANSWERS http (any
      # status code = the terminal process is up and listening). wget returns 0
      # on 2xx; on 4xx/410 it exits non-zero but still PRINTS the status line to
      # stderr ("HTTP request sent, awaiting response... 410"), so grep that as
      # proof of a live HTTP responder.
      test: ["CMD", "sh", "-c", "wget -S -qO- http://127.0.0.1:25503/ 2>&1 | grep -q 'HTTP/' || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s   # runtime jar download + auth handshake takes a bit
