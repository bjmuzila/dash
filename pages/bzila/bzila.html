  <script>
  (function() {
    'use strict';

    const PRICE_BUCKET_ES = 0.50;
    const PRICE_BUCKET_NQ = 2.00;
    const ES_REST_SYMBOL = '/ESM6';
    const NQ_REST_SYMBOL = '/NQM6';
    const ES_STREAM_SYMBOL = '/ES:XCME';
    const NQ_STREAM_SYMBOL = '/NQ:XCME';

    // State
    const defaultState = {
      esMinSize: 100,
      nqMinSize: 50,
      fadeMinutes: 15,
      esPrice: 5900.00,
      nqPrice: 20800.00,
      esTrades: [],
      nqTrades: [],
      ws: null,
      connected: false,
      // SPX 0DTE Premium Flow state
      spxPrice: 0,
      callPremiumFlow: 0,    // Cumulative OTM call net drift ($)
      putPremiumFlow: 0,     // Cumulative OTM put net drift, visually inverted ($)
      netPremiumFlow: 0,     // Call drift + inverted put drift
      flowHistory: [],       // [{ts, call, put, net, spx}] - snapshots for chart
      spxTradeOrders: [],    // live classified SPX option trades for right snapshot
      spxSnapshotLastPersistTs: 0,
      gexRows: [],
      spxGexHistory: [],
      gexLastPersistTs: 0,
      lastFlowCross: null,
      // SPX option quotes cache (for NBBO lookup at trade time)
      spxQuotes: {},         // symbol -> {bid, ask, ts}
      futureQuotes: {},      // symbol -> {bid, ask, ts}
      lastTradeBySymbol: {}, // symbol -> last trade price for side fallback
      // Pan/zoom state
      chartPan: 0,           // Offset in data points (left/right drag)
      chartZoom: 1,          // Scale factor (1 = all data, >1 = zoomed in)
    };
    const state = window.__bzilaFlowState || defaultState;
    window.__bzilaFlowState = state;
    if (!state.dbMinuteBaseline) {
      state.dbMinuteBaseline = {
        callPremiumFlow: state.callPremiumFlow || 0,
        putPremiumFlow: state.putPremiumFlow || 0,
        netPremiumFlow: state.netPremiumFlow || 0
      };
    }

    // Elements
    const elements = {
      status: document.getElementById('bzila-status'),
      // SPX Premium Flow
      premiumCanvas: document.getElementById('bzila-premium-canvas'),
      premiumStats: document.getElementById('bzila-premium-stats'),
      callFlow: document.getElementById('bzila-call-flow'),
      putFlow: document.getElementById('bzila-put-flow'),
      netFlow: document.getElementById('bzila-net-flow'),
      gexFeed: document.getElementById('bzila-gex-feed'),
      gexCount: document.getElementById('bzila-gex-count'),
      gexCalls: document.getElementById('bzila-gex-calls'),
      gexPuts: document.getElementById('bzila-gex-puts'),
      gexLive: document.getElementById('bzila-gex-live'),
      gexHistoryStamp: document.getElementById('bzila-gex-history-stamp'),
      callDeltaGex: document.getElementById('bzila-call-delta-gex'),
      putDeltaGex: document.getElementById('bzila-put-delta-gex'),
      netDeltaGex: document.getElementById('bzila-net-delta-gex'),
    };

    function fmtSignedMoney(n) {
      const value = Number(n);
      if (!Number.isFinite(value)) return '$0';
      return (value >= 0 ? '+' : '-') + fmtMoney(Math.abs(value));
    }

    function computeDeltaWeightedGEX(r) {
      const cg = Number(r.callGEX || 0);
      const pg = Number(r.putGEX || 0);
      const cd = Number(r.callDelta || r.avgCallDelta || 0);
      const pd = Number(r.putDelta || r.avgPutDelta || 0);
      return { callDeltaGEX: cg * cd, putDeltaGEX: pg * pd, deltaWeightedGEX: cg * cd - pg * pd };
    }

    function getSpxFlowAction(type, side) {
      if (type === 'C' && side === 'buy') return 'BUY CALL';
      if (type === 'C' && side === 'sell') return 'SELL CALL';
      if (type === 'P' && side === 'buy') return 'BUY PUT';
      if (type === 'P' && side === 'sell') return 'SELL PUT';
      return 'FLOW';
    }

    function getSpxFlowBucket(type, side) {
      if (type === 'C' && side === 'buy') return 'bull';
      if (type === 'P' && side === 'sell') return 'bull';
      if (type === 'C' && side === 'sell') return 'bear';
      if (type === 'P' && side === 'buy') return 'bear';
      return 'neutral';
    }

    function addSpxFlowOrder(item, type, side, premium, size) {
      const strike = getOptionStrike(item.eventSymbol || '');
      const entry = {
        ts: Number(item.time || Date.now()),
        symbol: item.eventSymbol || '',
        strike: Number(strike || 0),
        type,
        side,
        action: getSpxFlowAction(type, side),
        bucket: getSpxFlowBucket(type, side),
        price: Number(item.price || 0),
        size: Number(size || 0),
        premium: Number(premium || 0),
        aggressorSide: side
      };
      state.spxTradeOrders = Array.isArray(state.spxTradeOrders) ? state.spxTradeOrders : [];
      state.spxTradeOrders.push(entry);
      if (state.spxTradeOrders.length > 250) state.spxTradeOrders.splice(0, state.spxTradeOrders.length - 250);
      return entry;
    }

    function fmtCompactCount(n) {
      const value = Number(n || 0);
      if (!Number.isFinite(value)) return '0';
      if (Math.abs(value) >= 1e6) return (value / 1e6).toFixed(1) + 'M';
      if (Math.abs(value) >= 1e3) return (value / 1e3).toFixed(1) + 'K';
      return String(Math.round(value));
    }

    function getSpxFlowStats() {
      const orders = Array.isArray(state.spxTradeOrders) ? state.spxTradeOrders : [];
      const callVol = orders.filter(o => o.type === 'C').reduce((s, o) => s + (o.size || 0), 0);
      const putVol  = orders.filter(o => o.type === 'P').reduce((s, o) => s + (o.size || 0), 0);
      const buyVol  = orders.filter(o => o.side === 'buy').reduce((s, o) => s + (o.size || 0), 0);
      const sellVol = orders.filter(o => o.side === 'sell').reduce((s, o) => s + (o.size || 0), 0);
      const bullVol = orders.filter(o => o.bucket === 'bull').reduce((s, o) => s + (o.size || 0), 0);
      const bearVol = orders.filter(o => o.bucket === 'bear').reduce((s, o) => s + (o.size || 0), 0);
      const totalVol = bullVol + bearVol;
      const bullPct = totalVol > 0 ? (bullVol / totalVol) * 100 : 50;
      const bearPct = totalVol > 0 ? (bearVol / totalVol) * 100 : 50;
      const pcr = callVol > 0 ? (putVol / callVol) : 0;
      const bbr = sellVol > 0 ? (buyVol / sellVol) : 0;
      const latest = orders.length ? orders[orders.length - 1] : null;
      const buckets = {
        buyCall:  orders.filter(o => o.action === 'BUY CALL').sort((a, b) => b.premium - a.premium).slice(0, 3),
        sellCall: orders.filter(o => o.action === 'SELL CALL').sort((a, b) => b.premium - a.premium).slice(0, 3),
        buyPut:   orders.filter(o => o.action === 'BUY PUT').sort((a, b) => b.premium - a.premium).slice(0, 3),
        sellPut:  orders.filter(o => o.action === 'SELL PUT').sort((a, b) => b.premium - a.premium).slice(0, 3),
      };
      return { orders, callVol, putVol, buyVol, sellVol, bullVol, bearVol, totalVol, bullPct, bearPct, pcr, bbr, latest, buckets };
    }

    function serializeSpxFlowOrder(order) {
      return {
        ts: Number(order?.ts || Date.now()),
        symbol: String(order?.symbol || ''),
        strike: Number(order?.strike || 0),
        type: String(order?.type || ''),
        side: String(order?.side || ''),
        action: String(order?.action || ''),
        bucket: String(order?.bucket || ''),
        price: Number(order?.price || 0),
        size: Number(order?.size || 0),
        premium: Number(order?.premium || 0),
        aggressorSide: String(order?.aggressorSide || '')
      };
    }

    function buildBzilaLiveSnapshotPayload() {
      const stats = getSpxFlowStats();
      return {
        orders: stats.orders.map(serializeSpxFlowOrder),
        stats: {
          callVol: Number(stats.callVol || 0),
          putVol: Number(stats.putVol || 0),
          buyVol: Number(stats.buyVol || 0),
          sellVol: Number(stats.sellVol || 0),
          bullVol: Number(stats.bullVol || 0),
          bearVol: Number(stats.bearVol || 0),
          totalVol: Number(stats.totalVol || 0),
          bullPct: Number(stats.bullPct || 0),
          bearPct: Number(stats.bearPct || 0),
          pcr: Number(stats.pcr || 0),
          bbr: Number(stats.bbr || 0),
          latestTs: Number(stats.latest?.ts || 0),
          latestAction: String(stats.latest?.action || '')
        }
      };
    }

    function normalizeGexRows(rows) {
      return (Array.isArray(rows) ? rows : [])
        .filter(r => Number.isFinite(Number(r?.strike)))
        .map(r => {
          const { callDeltaGEX, putDeltaGEX, deltaWeightedGEX } = computeDeltaWeightedGEX(r);
          return {
            strike: Number(r.strike),
            callGEX: Number(r.callGEX || 0),
            putGEX: Number(r.putGEX || 0),
            callDelta: Number(r.callDelta || r.avgCallDelta || 0),
            putDelta: Number(r.putDelta || r.avgPutDelta || 0),
            callDeltaGEX, putDeltaGEX, deltaWeightedGEX
          };
        })
        .sort((a, b) => a.strike - b.strike);
    }

    function getSpxGexRows() {
      if (typeof window.getInsights0DTERows === 'function') {
        try {
          const result = window.getInsights0DTERows();
          const rows = Array.isArray(result?.rows) ? result.rows : [];
          return rows
            .filter(r => Number.isFinite(Number(r?.strike)))
            .map(r => {
              const { callDeltaGEX, putDeltaGEX, deltaWeightedGEX } = computeDeltaWeightedGEX(r);
              return {
                strike: Number(r.strike),
                callGEX: Number(r.callGEX || 0),
                putGEX: Number(r.putGEX || 0),
                callDelta: Number(r.callDelta || r.avgCallDelta || 0),
                putDelta: Number(r.putDelta || r.avgPutDelta || 0),
                callDeltaGEX, putDeltaGEX, deltaWeightedGEX
              };
            })
            .sort((a, b) => a.strike - b.strike);
        } catch (err) {
          console.warn('SPX GEX rows unavailable:', err);
        }
      }
      return [];
    }

    async function fetchSpxGexRowsFallback() {
      try {
        const res = await fetch('/proxy/api/tt/gex-top-3', { cache: 'no-store' });
        if (!res.ok) return [];
        const data = await res.json();
        const rows = Array.isArray(data?.rows) ? data.rows : [];
        return rows
          .filter(r => Number.isFinite(Number(r?.strike)))
          .map(r => {
            const { callDeltaGEX, putDeltaGEX, deltaWeightedGEX } = computeDeltaWeightedGEX(r);
            return {
              strike: Number(r.strike),
              callGEX: Number(r.callGEX || 0),
              putGEX: Number(r.putGEX || 0),
              callDelta: Number(r.callDelta || r.avgCallDelta || 0),
              putDelta: Number(r.putDelta || r.avgPutDelta || 0),
              callDeltaGEX, putDeltaGEX, deltaWeightedGEX
            };
          })
          .sort((a, b) => a.strike - b.strike);
      } catch (err) {
        console.warn('SPX GEX fallback unavailable:', err);
        return [];
      }
    }

    async function refreshSpxGexRows() {
      let rows = getSpxGexRows();
      if (!rows.length) rows = await fetchSpxGexRowsFallback();
      state.gexRows = rows;
      updateDeltaGexStats(rows);
      renderGexPanel();
      renderPremiumChart();
      persistSpxGexSnapshot(!state.spxGexHistory?.length);
    }

    function updateDeltaGexStats(rows) {
      if (!rows.length) {
        if (elements.gexHistoryStamp) elements.gexHistoryStamp.textContent = 'WAITING';
        renderSpxGexHistoryChart();
        return;
      }
      const callTotal = rows.reduce((s, r) => s + (r.callDeltaGEX || 0), 0);
      const putTotal  = rows.reduce((s, r) => s + (r.putDeltaGEX  || 0), 0);
      const net = callTotal - putTotal;
      if (elements.callDeltaGex) elements.callDeltaGex.textContent = fmtSignedMoney(callTotal);
      if (elements.putDeltaGex)  elements.putDeltaGex.textContent  = fmtSignedMoney(putTotal);
      if (elements.netDeltaGex) {
        elements.netDeltaGex.textContent = fmtSignedMoney(net);
        elements.netDeltaGex.style.color = net >= 0 ? '#22c55e' : '#f97316';
      }
      if (elements.gexLive) elements.gexLive.textContent = 'LIVE';
      renderSpxGexHistoryChart();
    }

    function renderGexPanel() {
      const rows = state.gexRows || [];
      const topCalls = [...rows].sort((a, b) => Math.abs(b.callDeltaGEX || 0) - Math.abs(a.callDeltaGEX || 0)).slice(0, 3);
      const topPuts  = [...rows].sort((a, b) => Math.abs(b.putDeltaGEX  || 0) - Math.abs(a.putDeltaGEX  || 0)).slice(0, 3);
      const combined = [...topCalls, ...topPuts];

      if (elements.gexLive) elements.gexLive.textContent = rows.length ? 'LIVE' : 'WAITING';
      if (elements.gexCount) elements.gexCount.textContent = `${combined.length} strikes`;
      if (elements.gexCalls) elements.gexCalls.textContent = String(topCalls.length);
      if (elements.gexPuts)  elements.gexPuts.textContent  = String(topPuts.length);

      if (!elements.gexFeed) return;
      if (!combined.length) {
        elements.gexFeed.innerHTML = `<div style="padding:8px;color:#475569;text-align:center">Waiting for SPX GEX data...</div>`;
        return;
      }

      elements.gexFeed.innerHTML = `
        <div style="padding:8px 8px 6px;color:#64748b;font-size:9px;border-bottom:1px solid #14202e">
          Call side ranked by callGEX ?? ??call ?? Put side ranked by putGEX ?? ??put.
        </div>
        <div style="padding:6px 0">
          ${topCalls.map(row => `
            <div style="display:grid;grid-template-columns:56px 1fr auto;gap:8px;align-items:center;padding:7px 8px;border-bottom:1px solid #14202e;background:rgba(34,197,94,0.06)">
              <div style="color:#94a3b8">${row.strike.toLocaleString()}</div>
              <div style="color:#22c55e;font-weight:700">CALL</div>
              <div style="text-align:right">
                <div style="color:#e2e8f0;font-weight:700">${fmtSignedMoney(row.callDeltaGEX)}</div>
                <div style="color:#64748b">?? ${row.callDelta.toFixed(2)} ?? GEX ${fmtSignedMoney(row.callGEX)}</div>
              </div>
            </div>
          `).join('')}
          ${topPuts.map(row => `
            <div style="display:grid;grid-template-columns:56px 1fr auto;gap:8px;align-items:center;padding:7px 8px;border-bottom:1px solid #14202e;background:rgba(249,115,22,0.06)">
              <div style="color:#94a3b8">${row.strike.toLocaleString()}</div>
              <div style="color:#f97316;font-weight:700">PUT</div>
              <div style="text-align:right">
                <div style="color:#e2e8f0;font-weight:700">${fmtSignedMoney(row.putDeltaGEX)}</div>
                <div style="color:#64748b">?? ${row.putDelta.toFixed(2)} ?? GEX ${fmtSignedMoney(row.putGEX)}</div>
              </div>
            </div>
          `).join('')}
        </div>
      `;
    }

    function renderSpxGexHistoryChart() {
      const stamp = elements.gexHistoryStamp;
      const hist = Array.isArray(state.spxGexHistory) ? state.spxGexHistory.filter(p => Number.isFinite(Number(p?.net))) : [];
      if (stamp) {
        if (hist.length) {
          const last = hist[hist.length - 1];
          stamp.textContent = `${hist.length} snaps @ ${new Date(last.ts).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}`;
        } else {
          stamp.textContent = 'WAITING';
        }
      }
      renderPremiumChart();
    }

    async function persistSpxGexSnapshot(force = false) {
      const rows = normalizeGexRows(state.gexRows || []);
      if (!rows.length) return;
      const now = Date.now();
      if (!force && now - (state.gexLastPersistTs || 0) < 30000) return;
      const topRows = [...rows].sort((a, b) => Math.abs(b.deltaWeightedGEX || 0) - Math.abs(a.deltaWeightedGEX || 0)).slice(0, 3);
      const callTotal = rows.reduce((s, r) => s + (r.callDeltaGEX || 0), 0);
      const putTotal  = rows.reduce((s, r) => s + (r.putDeltaGEX  || 0), 0);
      const net = callTotal - putTotal;
      const spot = Number(state.spxPrice || state.esPrice || 0);
      const db = (typeof DB !== 'undefined' && DB?.db) ? DB : null;
      try {
        if (db && typeof db.saveSpxGexSnapshot === 'function') {
          await db.saveSpxGexSnapshot(topRows, spot, {
            totalCallDeltaGEX: callTotal,
            totalPutDeltaGEX: putTotal,
            net
          }, 'bzila');
        } else if (db && typeof db.saveGexTop3Snapshot === 'function') {
          await db.saveGexTop3Snapshot(topRows, spot, {
            totalCallDeltaGEX: callTotal,
            totalPutDeltaGEX: putTotal,
            net
          });
        }
        state.gexLastPersistTs = now;
        state.spxGexHistory = Array.isArray(state.spxGexHistory) ? state.spxGexHistory : [];
        state.spxGexHistory.push({
          ts: now,
          call: callTotal,
          put: putTotal,
          net,
          spot,
          rows: topRows
        });
        const dayStart = new Date();
        dayStart.setHours(0, 0, 0, 0);
        const cutoff = dayStart.getTime();
        state.spxGexHistory = state.spxGexHistory.filter(p => p.ts >= cutoff);
        renderSpxGexHistoryChart();
      } catch (err) {
        console.warn('SPX GEX snapshot save failed:', err);
      }
    }

    async function hydrateSpxGexHistoryFromDatabase() {
      if (typeof DB === 'undefined' || !DB?.db) return;

          ? await DB.querySpxGex_Today()
          : (typeof DB.queryGexTop3_Today === 'function' ? await DB.queryGexTop3_Today() : []);

          renderSpxGexHistoryChart();
          return;

        state.spxGexHistory = sorted.map(r => ({
          ts: Number(r.timestamp || Date.now()),
          call: Number(r.totalCallDeltaGEX || 0),
          put: Number(r.totalPutDeltaGEX || 0),
          net: Number(r.netDeltaGEX || ((r.totalCallDeltaGEX || 0) - (r.totalPutDeltaGEX || 0))),
          spot: Number(r.spot || 0),
          rows: normalizeGexRows(r.rows || [])
        }));
        const latest = sorted[sorted.length - 1];
        state.gexLastPersistTs = Number(latest.timestamp || Date.now());
        if (Array.isArray(latest.rows) && latest.rows.length) {
          state.gexRows = normalizeGexRows(latest.rows);
          updateDeltaGexStats(state.gexRows);

    // Setup canvas
    function setupCanvas(canvas) {
      if (!canvas) return;

    // Format money compactly
    function fmtCompactNumber(value, divisor = 1) {
      const scaled = value / divisor;
      return scaled.toLocaleString('en-US', {
        minimumFractionDigits: 0,
        maximumFractionDigits: 4,
        useGrouping: false
      });
    }

    function fmtMoney(n) {
      const value = Number(n);
      if (!Number.isFinite(value)) return '$0';
      const abs = Math.abs(value);
      const sign = value < 0 ? '-' : '';
      if (abs >= 1e9) return sign + '$' + fmtCompactNumber(abs, 1e9) + 'B';
      if (abs >= 1e6) return sign + '$' + fmtCompactNumber(abs, 1e6) + 'M';
      if (abs >= 1e3) return sign + '$' + fmtCompactNumber(abs, 1e3) + 'K';
      return sign + '$' + fmtCompactNumber(abs);
    }

    // ════════════════════════════════════════════
    // SPX 0DTE PREMIUM FLOW LOGIC
    // ════════════════════════════════════════════

    // Determine if SPX option symbol is a Call or Put
    // OCC format: SPXW  YYMMDDC00000000 / P00000000
    function getOptionType(symbol) {
      const m = symbol.match(/\d{6}([CP])\d/);
      return m ? m[1] : null; // 'C' or 'P'
    }

    // Check if symbol is 0DTE SPX (expires today)
    function isSpx0DTE(symbol) {
      if (!symbol.startsWith('.SPXW') && !symbol.startsWith('SPXW')) return false;
      const m = symbol.match(/(\d{6})[CP]/);
      if (!m) return false;
      const dateStr = m[1]; // YYMMDD
      const today = new Date();
      const yy = String(today.getFullYear()).slice(2);
      const mm = String(today.getMonth() + 1).padStart(2, '0');
      const dd = String(today.getDate()).padStart(2, '0');
      return dateStr === `${yy}${mm}${dd}`;
    }

    function getOptionStrike(symbol) {
      const m = symbol.match(/[CP](\d+(?:\.\d+)?)$/);
      if (!m) return null;
      const raw = m[1];
      const strike = parseFloat(raw);
      if (!Number.isFinite(strike)) return null;
      return raw.length === 8 ? strike / 1000 : strike;
    }

    function isOtmOption(symbol, optType) {
      const strike = getOptionStrike(symbol);
      const refPrice = state.spxPrice || state.esPrice || 0;
      if (!strike || !refPrice) return false;
      if (optType === 'C') return strike > refPrice;
      if (optType === 'P') return strike < refPrice;
      return false;
    }

    function getAggressorDirection(item, quote) {
      const tradePrice = parseFloat(item.price || 0);
      if (quote && quote.bid > 0 && quote.ask > 0) {
        if (tradePrice >= quote.ask) return 1;
        if (tradePrice <= quote.bid) return -1;
        return 0;
      }
      const ag = item.aggressorSide || '';
      if (ag === 'BUY') return 1;
      if (ag === 'SELL') return -1;
      return 0;
    }

    // Process incoming SPX option trade
    function processSpxTrade(item) {
      const symbol = item.eventSymbol || '';
      if (!isSpx0DTE(symbol)) return;

      const optType = getOptionType(symbol);
      if (!optType) return;
      if (!isOtmOption(symbol, optType)) return;

      const tradePrice = parseFloat(item.price || 0);
      const size = parseInt(item.size || 0);
      if (!tradePrice || !size) return;

      const quote = state.spxQuotes[symbol];
      const direction = getAggressorDirection(item, quote);
      if (direction === 0) return;

      const premium = tradePrice * size * 100;

      const side = direction > 0 ? 'buy' : 'sell';
      addSpxFlowOrder(item, optType, side, premium, size);

      if (optType === 'C') {
        if (direction > 0) {
          state.callPremiumFlow += premium;
          state.netPremiumFlow += premium;
        } else {
          state.netPremiumFlow -= premium;
        }
      } else if (optType === 'P') {
        if (direction > 0) {
          state.putPremiumFlow += premium;
          state.netPremiumFlow -= premium;
        } else {
          state.netPremiumFlow += premium;
        }
      }
      updateFlowLabels();
    }

    // Process SPX quote update (track NBBO for each option)
    function processSpxQuote(item) {
      const symbol = item.eventSymbol || '';
      if (!symbol.startsWith('.SPXW') && !symbol.startsWith('SPXW')) return;
      const bid = parseFloat(item.bidPrice || 0);
      const ask = parseFloat(item.askPrice || 0);
      if (bid > 0 && ask > 0) {
        state.spxQuotes[symbol] = { bid, ask, ts: Date.now() };
      }
    }

    function normalizeFeedData(data) {
      if (!Array.isArray(data)) return [];
      if (data.length && typeof data[0] === 'object' && !Array.isArray(data[0])) return data;
      const eventType = data[0];
      const rows = data[1];
      if (typeof eventType !== 'string' || !Array.isArray(rows)) return [];
      const fieldsByType = {
        Quote: ['bidPrice','askPrice','bidSize','askSize'],
        Trade: ['price','dayVolume','size'],
        TradeETH: ['price','dayVolume','size'],
        TimeAndSale: ['time','sequence','exchangeCode','price','size','bidPrice','askPrice','saleConditions','flags','aggressorSide']
      };
      const fields = fieldsByType[eventType];
      if (!fields) return [];
      const rowsIncludeType = rows[0] === eventType;
      const step = fields.length + (rowsIncludeType ? 2 : 1);
      const out = [];
      for (let i = 0; i <= rows.length - step; i += step) {
        const base = i + (rowsIncludeType ? 2 : 1);
        const item = {
          eventType: rowsIncludeType ? rows[i] : eventType,
          eventSymbol: rowsIncludeType ? rows[i + 1] : rows[i],
          time: Date.now()
        };
        fields.forEach((field, j) => item[field] = rows[base + j]);
        out.push(item);
      }
      return out;
    }

    function getSessionOpenTs() {
      const now = new Date();
      const open = new Date();
      open.setHours(9, 30, 0, 0);
      if (now < open) open.setDate(open.getDate() - 1);
      return open.getTime();
    }

    // Snapshot premium flow for full-session chart history
    function snapshotFlow() {
      const ts = Date.now();
      
      // Stop recording after 4 PM ET
      const now = new Date();
      const fourPM = new Date();
      fourPM.setHours(16, 0, 0, 0);
      if (now >= fourPM) return;
      
      const prev = state.flowHistory[state.flowHistory.length - 1];
      state.flowHistory.push({
        ts,
        call: state.callPremiumFlow,
        put: state.putPremiumFlow,
        net: state.netPremiumFlow,
        spx: state.esPrice
      });
      const sessionOpen = getSessionOpenTs();
      state.flowHistory = state.flowHistory.filter(p => p.ts >= sessionOpen);

      if (prev) {
        // Compare calls vs puts directly (not the net)
        const prevCallAbovePut = prev.call > prev.put;
        const currCallAbovePut = state.netPremiumFlow >= 0;
        
        // Detect cross: was calls below puts, now calls above puts (or vice versa)
        if (prevCallAbovePut !== currCallAbovePut) {
          if (currCallAbovePut && !prevCallAbovePut) {
            // Calls crossed above puts
            state.lastFlowCross = 'calls-over-puts';
            if (typeof addEvent === 'function') addEvent({
              type: 'flow-cross',
              title: 'CALLS OVER PUTS',
              side: 'buy',
              volume: Math.round(Math.abs(state.callPremiumFlow)),
              trades: 1,
              instrument: 'FLOW',
              price: state.esPrice
            });
          } else if (!currCallAbovePut && prevCallAbovePut) {
            // Puts crossed above calls
            state.lastFlowCross = 'puts-over-calls';
            if (typeof addEvent === 'function') addEvent({
              type: 'flow-cross',
              title: 'PUTS OVER CALLS',
              side: 'sell',
              volume: Math.round(Math.abs(state.putPremiumFlow)),
              trades: 1,
              instrument: 'FLOW',
              price: state.esPrice
            });
          }
        }
      }
      updateFlowLabels();
    }

    async function saveMinuteFlowToDatabase() {

      const baseline = state.dbMinuteBaseline || {
        callPremiumFlow: state.callPremiumFlow || 0,
        putPremiumFlow: state.putPremiumFlow || 0
      };
      const callPremiumDelta = (state.callPremiumFlow || 0) - (baseline.callPremiumFlow || 0);
      const putPremiumDisplayDelta = (state.putPremiumFlow || 0) - (baseline.putPremiumFlow || 0);
      const price = state.spxPrice || state.esPrice || 0;

      try {
        const netPremiumDelta = (state.netPremiumFlow || 0) - ((baseline.netPremiumFlow ?? 0));
        await DB.saveMinutePremiumFlow(callPremiumDelta, putPremiumDisplayDelta, price, 'SPX', netPremiumDelta);
        state.dbMinuteBaseline = {
          callPremiumFlow: state.callPremiumFlow || 0,
          putPremiumFlow: state.putPremiumFlow || 0,
          netPremiumFlow: state.netPremiumFlow || 0
        };
      } catch (err) {
        console.error('Bzila DB minute save failed:', err);

    }

    async function hydratePremiumFlowFromDatabase() {
      if (typeof DB === 'undefined' || !DB?.db) return;
      try {
        let records = [];
        try {
          records = typeof DB.queryPremiumFlow_Today === 'function'
            ? await DB.queryPremiumFlow_Today()
            : await DB.queryPremiumFlow_TimeSeries(8);
        } catch (err) {
          if (err?.name !== 'NotFoundError' || typeof DB._getAllRecords !== 'function') throw err;
          const today = new Date().toISOString().split('T')[0];
          records = (await DB._getAllRecords('premiumFlow')).filter(r => r.date === today);
        }
        const sorted = (records || []).slice().sort((a, b) => a.timestamp - b.timestamp);
        if (!sorted.length) return;

        let callTotal = 0;
        let putDisplayTotal = 0;
        let netTotal = 0;
        state.flowHistory = sorted.map(r => {
          callTotal += Number(r.callFlow ?? r.netCallPremium ?? 0);
          putDisplayTotal += Number(r.putFlow ?? r.netPutPremium ?? 0);
          netTotal += Number(r.netFlow ?? ((r.callFlow ?? 0) - (r.putFlow ?? 0)));
          return {
            ts: Number(r.timestamp || Date.now()),
            call: callTotal,
            put: putDisplayTotal,
            net: netTotal,
            spx: Number(r.esPrice || r.spxPrice || state.spxPrice || state.esPrice || 0)
          };
        });

        state.callPremiumFlow = callTotal;
        state.putPremiumFlow = putDisplayTotal;
        state.netPremiumFlow = netTotal;
        state.dbMinuteBaseline = {
          callPremiumFlow: state.callPremiumFlow || 0,
          putPremiumFlow: state.putPremiumFlow || 0,
          netPremiumFlow: state.netPremiumFlow || 0
        };
        updateFlowLabels();
      } catch (err) {
        console.error('Bzila premium history load failed:', err);
      }
    }

    async function saveBzilaLiveSnapshotToDatabase(force = false) {
      if (typeof DB === 'undefined' || !DB?.db || typeof DB.saveBzilaLiveSnapshot !== 'function') return;
      const now = Date.now();
      if (!force && now - (state.spxSnapshotLastPersistTs || 0) < 30000) return;
      if (!Array.isArray(state.spxTradeOrders) || !state.spxTradeOrders.length) return;
      try {
        await DB.saveBzilaLiveSnapshot(buildBzilaLiveSnapshotPayload());
        state.spxSnapshotLastPersistTs = now;
      } catch (err) {
        console.error('Bzila live snapshot save failed:', err);
      }
    }

    async function hydrateBzilaLiveSnapshotFromDatabase() {
      if (typeof DB === 'undefined' || !DB?.db || typeof DB.queryBzilaLiveSnapshots_Today !== 'function') return;
      try {
        const records = await DB.queryBzilaLiveSnapshots_Today();
        const latest = Array.isArray(records) && records.length ? records[records.length - 1] : null;
        if (!latest) return;
        state.spxTradeOrders = Array.isArray(latest.orders)
          ? latest.orders.map(serializeSpxFlowOrder)
          : [];
        state.spxSnapshotLastPersistTs = Number(latest.timestamp || Date.now());
        renderPremiumStatsBox();
      } catch (err) {
        console.error('Bzila live snapshot load failed:', err);
      }
    }

    function hydratePremiumFlowWhenDatabaseReady() {
      if (typeof DB !== 'undefined' && DB?.db) {
        hydratePremiumFlowFromDatabase();
        hydrateBzilaLiveSnapshotFromDatabase();
        return;
      }
      window.addEventListener('db-ready', () => {
        hydratePremiumFlowFromDatabase();
        hydrateBzilaLiveSnapshotFromDatabase();

    function processFutureQuote(item) {
      const symbol = item.eventSymbol || '';
      if (!symbol.startsWith('/ES') && !symbol.startsWith('/NQ')) return;
      const bid = parseFloat(item.bidPrice || 0);
      const ask = parseFloat(item.askPrice || 0);
      if (bid > 0 && ask > 0) {
        state.futureQuotes[symbol] = { bid, ask, ts: Date.now() };
      }
    }

    function getAggressorSide(symbol, price, item) {
      const bid = parseFloat(item.bidPrice || 0);
      const ask = parseFloat(item.askPrice || 0);
      const quote = (bid > 0 && ask > 0) ? { bid, ask } : state.futureQuotes[symbol];
      if (quote && quote.bid > 0 && quote.ask > 0) {
        if (price >= quote.ask) return 'buy';
        if (price <= quote.bid) return 'sell';
      }
      const ag = item.aggressorSide || '';
      if (ag === 'BUY') return 'buy';
      if (ag === 'SELL') return 'sell';
      const prev = state.lastTradeBySymbol[symbol];
      if (prev == null || price === prev) return null;
      return price > prev ? 'buy' : 'sell';
    }


    // ════════════════════════════════════════════
    // CHART RENDERERS
    // ════════════════════════════════════════════
    function renderPremiumChart() {
      const canvas = elements.premiumCanvas;
      if (!canvas) return;
      const ctx = canvas.getContext('2d');
      const parent = canvas.parentElement;
      const rect = parent ? parent.getBoundingClientRect() : { width: 0, height: 0 };
      const W = rect.width || parseFloat(canvas.style.width) || 0;
      const H = rect.height || parseFloat(canvas.style.height) || 0;
      if (!W || !H) return;
      if (canvas.width !== W || canvas.height !== H) { canvas.width = W; canvas.height = H; }
      ctx.clearRect(0, 0, W, H);
      ctx.fillStyle = '#0a0e14';
      ctx.fillRect(0, 0, W, H);

      const hist = Array.isArray(state.spxGexHistory)
        ? state.spxGexHistory.filter(p => Number.isFinite(Number(p?.net)) && Number.isFinite(Number(p?.ts)))
        : [];

      if (!hist.length) {
        ctx.fillStyle = '#94a3b8';
        ctx.font = 'bold 12px monospace';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('Waiting for saved SPX GEX snapshots...', W / 2, H / 2);
        return;
      }

      const series = hist.map(p => ({
        ts: Number(p.ts || Date.now()),
        net: Number(p.net || 0),
        call: Number(p.call || 0),
        put: Number(p.put || 0),
        spot: Number(p.spot || 0)
      }));

      const values = series.map(p => p.net);
      const minVal = Math.min(...values, 0);
      const maxVal = Math.max(...values, 0);
      const maxAbs = Math.max(Math.abs(minVal), Math.abs(maxVal), 1);

      const pad = { l: 56, r: 20, t: 22, b: 38 };
      const plotW = Math.max(1, W - pad.l - pad.r);
      const plotH = Math.max(1, H - pad.t - pad.b);
      const xAt = i => pad.l + (series.length === 1 ? plotW / 2 : (plotW * i) / (series.length - 1));
      const yAt = value => pad.t + (maxAbs - value) / (maxAbs * 2) * plotH;
      const zeroY = yAt(0);

      ctx.fillStyle = '#0a0e14';
      ctx.fillRect(0, 0, W, H);

      // Grid and zero line
      ctx.strokeStyle = '#162130';
      ctx.lineWidth = 1;
      ctx.beginPath();
      for (let i = 0; i <= 4; i++) {
        const y = pad.t + (plotH * i) / 4;
        ctx.moveTo(pad.l, y);
        ctx.lineTo(W - pad.r, y);
      }
      ctx.stroke();

      ctx.strokeStyle = '#334155';
      ctx.beginPath();
      ctx.moveTo(pad.l, zeroY);
      ctx.lineTo(W - pad.r, zeroY);
      ctx.stroke();

      ctx.save();
      ctx.strokeStyle = '#00e5ff';
      ctx.lineWidth = 2.5;
      ctx.lineJoin = 'round';
      ctx.lineCap = 'round';
      ctx.shadowColor = '#00e5ff';
      ctx.shadowBlur = 8;
      ctx.beginPath();
      series.forEach((p, i) => {
        const x = xAt(i);
        const y = yAt(p.net);
        if (i === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
      });
      ctx.stroke();
      ctx.restore();

      series.forEach((p, i) => {
        const x = xAt(i);
        const y = yAt(p.net);
        ctx.fillStyle = p.net >= 0 ? '#22c55e' : '#f97316';
        ctx.beginPath();
        ctx.arc(x, y, 3, 0, Math.PI * 2);
        ctx.fill();
      });

      // Axes labels
      ctx.fillStyle = '#94a3b8';
      ctx.font = '10px monospace';
      ctx.textAlign = 'right';
      ctx.textBaseline = 'middle';
      [maxAbs, maxAbs * 0.5, 0, -maxAbs * 0.5, -maxAbs].forEach(val => {
        const y = yAt(val);
        ctx.fillText(fmtSignedMoney(val), pad.l - 8, y);
      });

      ctx.textAlign = 'center';
      ctx.textBaseline = 'top';
      const tickCount = Math.min(series.length, 5);
      const step = Math.max(1, Math.floor(series.length / Math.max(1, tickCount - 1)));
      for (let i = 0; i < series.length; i += step) {
        const p = series[i];
        ctx.fillText(new Date(p.ts).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }), xAt(i), H - pad.b + 6);
      }
      if ((series.length - 1) % step !== 0) {
        const last = series[series.length - 1];
        ctx.fillText(new Date(last.ts).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }), xAt(series.length - 1), H - pad.b + 6);
      }

      // Legend / footer
      const latest = series[series.length - 1];
      ctx.textAlign = 'left';
      ctx.textBaseline = 'top';
      ctx.font = 'bold 11px monospace';
      ctx.fillStyle = '#00e5ff';
      ctx.fillText('SPX GEX HISTORY', pad.l, 6);
      ctx.textAlign = 'right';
      ctx.fillStyle = latest.net >= 0 ? '#22c55e' : '#f97316';
      ctx.fillText(fmtSignedMoney(latest.net), W - pad.r, 6);
      ctx.fillStyle = '#475569';
      ctx.font = '10px monospace';
      ctx.fillText('TIME ON X  |  GEX $ ON Y', W - pad.r, H - 10);
      state.premiumChartConfig = { W, H, series, latestNet: latest.net };

      ctx.textAlign = 'left';
      ctx.textBaseline = 'top';
      ctx.font = 'bold 11px monospace';
      ctx.fillStyle = '#00e5ff';
      ctx.fillText('CALL Δ-GEX', pad.l, 6);
      ctx.fillStyle = '#ef4444';
      ctx.fillText('PUT Δ-GEX', pad.l + 110, 6);
      ctx.fillStyle = '#475569';
      ctx.font = '10px monospace';
      ctx.textAlign = 'right';
      ctx.fillText('SPX 0DTE · CALL / PUT LINE CHART', W - pad.r, H - 10);

      const totalCallDeltaGEX = series.reduce((s, p) => s + p.call, 0);
      const totalPutDeltaGEX = series.reduce((s, p) => s + p.put, 0);
      const net = series.reduce((s, p) => s + p.net, 0);
      state.premiumChartConfig = { totalCallDeltaGEX, totalPutDeltaGEX, net, W, H, series };
    }


    // Initial prices will be populated from the dxLink WebSocket stream

    // WebSocket connection
    function connectWebSocket() {
      if (state.ws) state.ws.close();
      
      const ws = new WebSocket('ws://localhost:3001/ws/dxlink');
      state.ws = ws;

      ws.onopen = () => {
        console.log('Bzila: dxLink connected');
        state.connected = true;
        elements.status.textContent = '● LIVE';
        elements.status.style.background = '#065f46';
        elements.status.style.color = '#6ee7b7';
        
        ws.send(JSON.stringify({
          type: 'subscribe',
          symbols: [ES_STREAM_SYMBOL, NQ_STREAM_SYMBOL],
          feedTypes: ['Trade', 'TimeAndSale', 'Quote'],
          spxSubscribe: true  // flag for proxy to also subscribe SPX 0DTE options
        }));
      };

      ws.onmessage = (event) => {
        try {
          const msg = JSON.parse(event.data);
          
          if (msg.type === 'FEED_DATA' && Array.isArray(msg.data)) {
            normalizeFeedData(msg.data).forEach(item => {
              const symbol = item.eventSymbol || '';
              const eventType = item.eventType || '';

              if (eventType === 'Quote' && (symbol.startsWith('/ES') || symbol.startsWith('/NQ'))) {
                processFutureQuote(item);
                return;
              }

              // ── SPX Quote: cache NBBO for aggressor-side detection ──
              if (eventType === 'Quote' && (symbol.startsWith('.SPXW') || symbol.startsWith('SPXW'))) {
                processSpxQuote(item);
                return;
              }

              if (eventType !== 'Trade' && eventType !== 'TradeETH' && eventType !== 'TimeAndSale') return;

              const price = parseFloat(item.price || 0);
              const size = parseInt(item.size || 0);
              const timestamp = item.time || Date.now();
              if (!price || !size) return;

              // ── SPX 0DTE Option Trade ──
              if (symbol.startsWith('.SPXW') || symbol.startsWith('SPXW')) {
                processSpxTrade(item);
                return;
              }

              const side = getAggressorSide(symbol, price, item);

              // ── ES Futures Trade ──
              if (symbol.startsWith('/ES')) {
                state.esPrice = price;
                if (!state.spxPrice) state.spxPrice = price;
                if (!side) return;
                const trade = { timestamp, price, size, side };
                state.esTrades.push(trade);

                if (state.esTrades.length > 5000) state.esTrades.splice(0, 1000);

              // ── NQ Futures Trade ──
              } else if (symbol.startsWith('/NQ')) {
                state.nqPrice = price;
                state.lastTradeBySymbol[symbol] = price;
                if (!side) return;
                const trade = { timestamp, price, size, side };
                state.nqTrades.push(trade);

                if (state.nqTrades.length > 5000) state.nqTrades.splice(0, 1000);
              }
            });
          }
        } catch (e) {
          console.error('Bzila WS message error:', e);
        }
      };

      ws.onerror = (err) => {
        console.error('Bzila WS error:', err);
        state.connected = false;
        elements.status.textContent = '● ERROR';
        elements.status.style.background = '#7f1d1d';
        elements.status.style.color = '#fca5a5';
      };

      ws.onclose = () => {
        if (ws !== state.ws) return;
        console.log('Bzila WS closed');
        state.connected = false;
        elements.status.textContent = '● DISCONNECTED';
        elements.status.style.background = '#7f1d1d';
        elements.status.style.color = '#fca5a5';
        
        // Auto-reconnect after 5s
        reconnectTimeout = setTimeout(connectWebSocket, 5000);
      };
    }

    // ── Animation loop for charts ──
    let animFrame = null;
    let snapshotInterval = null;
    let gexPersistInterval = null;
    let dbMinuteInterval = null;
    let dailyResetTimeout = null;
    let reconnectTimeout = null;
    function animate() {
      renderPremiumChart();

    // ── Daily reset at 9:30 AM ET ──
    function scheduleDailyReset() {
      const now = new Date();
      const next = new Date();
      next.setHours(9, 30, 0, 0);
      if (next <= now) next.setDate(next.getDate() + 1);
      const msUntil = next - now;
      dailyResetTimeout = setTimeout(() => {
        state.callPremiumFlow = 0;
        state.putPremiumFlow = 0;
        state.netPremiumFlow = 0;
        state.flowHistory = [];
        state.spxTradeOrders = [];
        state.spxSnapshotLastPersistTs = 0;
        state.spxGexHistory = [];
      state.spxQuotes = {};
      state.futureQuotes = {};
      state.lastTradeBySymbol = {};
      state.lastFlowCross = null;
      state.dbMinuteBaseline = {
        callPremiumFlow: 0,
        putPremiumFlow: 0,
        netPremiumFlow: 0,
      };
        updateFlowLabels();
        // Flush GEX cache so the first post-open fetch is always fresh
        state.gexRows = [];
        refreshSpxGexRows();
        console.log('Bzila: daily reset at 9:30 AM ET');
        scheduleDailyReset();
      }, msUntil);
    }

    const DISCORD_WEBHOOK_URL = '/proxy/api/webhooks/1466249857122570454/REDACTED';

    // Load html2canvas library dynamically
    async function loadHtml2Canvas() {
      if (typeof html2canvas !== 'undefined') return;
      return new Promise((resolve, reject) => {
        const script = document.createElement('script');
        script.src = 'https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js';
        script.onload = () => setTimeout(resolve, 100);
        script.onerror = reject;
        document.head.appendChild(script);
      });
    }

    async function capturePremiumSnapshotBlob() {
      const layout = document.getElementById('bzila-premium-layout');
      const canvas = document.getElementById('bzila-premium-canvas');
      if (layout) {
        try {
          await loadHtml2Canvas();
          const shot = await html2canvas(layout, {
            backgroundColor: '#0a0f16',
            scale: 2,
            useCORS: true,
            logging: false
          });
          return await new Promise((resolve, reject) =>
            shot.toBlob(b => b ? resolve(b) : reject(new Error('Screenshot failed')), 'image/png')
          );
        } catch (err) {
          console.warn('Layout capture failed, falling back to canvas:', err);
        }
      }
      if (!canvas) throw new Error('Canvas not found');
      return await new Promise((resolve, reject) =>
        canvas.toBlob(b => b ? resolve(b) : reject(new Error('Screenshot failed')), 'image/png')
      );
    }

    function setShotBtn(btn, state, restoreText, restoreColor) {
      if (!btn) return;
      if (state === 'loading') {
        btn.textContent = '...';
        btn.style.color = '#ffb300';
        return;
      }
      btn.textContent = (state === 'ok' || state === 'success') ? 'OK' : 'ERR';
      btn.style.color = (state === 'ok' || state === 'success') ? '#00e676' : '#ff4757';
      setTimeout(() => {
        btn.textContent = restoreText;
        btn.style.color = restoreColor;
      }, 1500);
    }
    var setButtonFeedback = setShotBtn;

    // Copy SPX chart screenshot to clipboard
    async function copySPXChartScreenshot() {
      const btn = document.getElementById('bzila-copy-shot-btn');
      setShotBtn(btn, 'loading', 'COPY', '#00e5ff');
      try {
        const blob = await capturePremiumSnapshotBlob();
        await navigator.clipboard.write([new ClipboardItem({ 'image/png': blob })]);
        setShotBtn(btn, 'ok', 'COPY', '#00e5ff');
      } catch (e) {
        console.error('Screenshot copy failed:', e);
        setShotBtn(btn, 'err', 'COPY', '#00e5ff');
      }
    }

    async function shareSPXChart(platform) {
      const btn = platform === 'x'
        ? document.getElementById('bzila-share-x-btn')
        : document.getElementById('bzila-share-discord-btn');
      const origColor = platform === 'x' ? '#00e5ff' : '#7289da';
      const orig = btn ? btn.textContent : platform.toUpperCase();

      if (platform === 'x') {
        try {
          const blob = await capturePremiumSnapshotBlob();
          await navigator.clipboard.write([new ClipboardItem({ 'image/png': blob })]);
        } catch (e) {
          console.warn('X copy failed, opening Twitter anyway:', e);
        }
        window.open('https://twitter.com/intent/tweet?text=' + encodeURIComponent('SPX 0DTE Premium Flow'), '_blank', 'noopener,noreferrer');
        return;
      }

      // Discord
      setShotBtn(btn, 'loading', orig, origColor);
      try {
        const blob = await capturePremiumSnapshotBlob();
        const form = new FormData();
        form.append('payload_json', JSON.stringify({ content: 'SPX 0DTE Premium Flow' }));
        form.append('files[0]', blob, 'spx-premium-flow.png');
        const res = await fetch(DISCORD_WEBHOOK_URL, { method: 'POST', body: form });
        if (!res.ok) throw new Error('Discord webhook failed: ' + res.status);
        setShotBtn(btn, 'ok', orig, origColor);
      } catch (e) {
        console.error('Discord share failed:', e);
        setShotBtn(btn, 'err', orig, origColor);
      }
    }

    function refreshBzilaData() {
      const btn = document.getElementById('bzila-refresh-btn');
      if (!btn) return;

      const orig = btn.textContent;
      const origColor = '#10b981';
      setButtonFeedback(btn, 'loading');

      // Simulate refresh
      setTimeout(() => {
        // Update last refresh time
        const now = new Date();
        const timeStr = now.toLocaleTimeString('en-US', { 
          hour12: true, 
          hour: '2-digit', 
          minute: '2-digit', 
          second: '2-digit' 
        });

    }

    // Tab switching
    window.switchBzilaTab = function(tabName) {
      const spxTab         = document.getElementById('bzila-tab-spx');
      const multiChartsTab = document.getElementById('bzila-tab-multicharts');
      const spxBtn         = document.getElementById('tab-spx');
      const multiChartsBtn = document.getElementById('tab-multicharts');

      });

      if (tabName === 'spx') {

        if (spxBtn) { spxBtn.style.color = '#cbd5e1'; spxBtn.style.borderBottomColor = '#10b981'; }
        refreshSpxGexRows();
      } else if (tabName === 'multicharts') {
        if (multiChartsTab) multiChartsTab.style.display = 'flex';
        if (multiChartsBtn) { multiChartsBtn.style.color = '#cbd5e1'; multiChartsBtn.style.borderBottomColor = '#10b981'; }
      }
    };

    // Initialize when page loads
    window.initBzilaFlow = function() {
      if (state.ws || animFrame || snapshotInterval) window.cleanupBzilaFlow();
      console.log('Initializing Bzila Flow...');
      setupCanvas(elements.premiumCanvas);
      connectWebSocket();
      hydratePremiumFlowWhenDatabaseReady();
      hydrateSpxGexHistoryFromDatabase();
      refreshSpxGexRows();

      snapshotFlow();
      saveBzilaLiveSnapshotToDatabase(true);
      snapshotInterval = setInterval(() => {
        snapshotFlow();
        refreshSpxGexRows();
      }, 5000);
      if (gexPersistInterval) clearInterval(gexPersistInterval);
      gexPersistInterval = setInterval(() => {
        persistSpxGexSnapshot();
        saveBzilaLiveSnapshotToDatabase();
      }, 30000);
      state.dbMinuteBaseline = {
        callPremiumFlow: state.callPremiumFlow || 0,
        putPremiumFlow: state.putPremiumFlow || 0,
        netPremiumFlow: state.netPremiumFlow || 0
      };
      dbMinuteInterval = setInterval(saveMinuteFlowToDatabase, 60 * 1000);

      // Start animation loop
      animate();

      // Schedule daily reset
      scheduleDailyReset();
    };

    // Cleanup
    window.cleanupBzilaFlow = function() {
      if (animFrame) cancelAnimationFrame(animFrame);
      animFrame = null;
      if (snapshotInterval) clearInterval(snapshotInterval);
      snapshotInterval = null;
      if (dbMinuteInterval) clearInterval(dbMinuteInterval);
      dbMinuteInterval = null;
      if (gexPersistInterval) clearInterval(gexPersistInterval);
      gexPersistInterval = null;
      if (dailyResetTimeout) clearTimeout(dailyResetTimeout);
      dailyResetTimeout = null;
      if (reconnectTimeout) clearTimeout(reconnectTimeout);
      reconnectTimeout = null;
      if (state.ws) state.ws.close();
      state.ws = null;
    };
    if (window.PageRuntime?.register) {
      window.PageRuntime.register('bzila', () => window.cleanupBzilaFlow());
    }
    window.addEventListener('resize', renderSpxGexHistoryChart);
    window.init_bzila = window.initBzilaFlow;
    window.copySPXChartScreenshot = copySPXChartScreenshot;
    window.shareSPXChart = shareSPXChart;
    window.refreshBzilaData = refreshBzilaData;
  })();
