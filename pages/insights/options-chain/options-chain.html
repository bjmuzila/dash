<div id="chain-main" style="display:flex;position:absolute;inset:0;overflow:hidden;background:var(--bg0);flex-direction:column;font-family:Arial,sans-serif">

  <!-- Toolbar -->
  <div style="display:flex;align-items:center;gap:8px;padding:8px 14px;background:var(--bg1);border-bottom:1px solid var(--border);flex-shrink:0;flex-wrap:wrap">
    <div style="font-size:11px;font-weight:800;color:var(--cyan);letter-spacing:.14em;text-transform:uppercase">Options Chain</div>
    <!-- Ticker dropdown -->
    <input id="chain-ticker-select" list="chain-ticker-list" value="" autocomplete="off" spellcheck="false" style="font-size:10px;font-weight:800;padding:4px 8px;border:1px solid rgba(0,229,255,.4);border-radius:4px;background:#0a0e14;color:#00e5ff;cursor:text;font-family:Arial;outline:none;width:80px;text-transform:uppercase">
    <datalist id="chain-ticker-list"></datalist>
    <!-- Expiry dropdown -->
    <select id="chain-expiry-select" style="font-size:10px;font-weight:800;padding:4px 8px;border:1px solid rgba(255,255,255,.18);border-radius:4px;background:#0a0e14;color:#e4e4e7;cursor:pointer;font-family:Arial;outline:none">
      <option value="" style="background:#0a0e14;color:#e4e4e7">-- Expiry --</option>
    </select>
    <!-- Go button -->
    <button onclick="chainGo()" id="chain-go-btn" style="font-size:10px;font-weight:800;padding:4px 14px;border:1px solid rgba(0,229,255,.6);border-radius:4px;background:rgba(0,229,255,.15);color:#00e5ff;cursor:pointer;font-family:Arial;letter-spacing:.06em">GO</button>
    <div style="flex:1"></div>
    <div style="display:flex;align-items:center;gap:8px;color:#94a3b8;font-size:9px;font-weight:800;letter-spacing:.08em;text-transform:uppercase">
      <span>Intensity</span>
      <input id="chain-intensity" type="range" min="0.2" max="3" step="0.01" value="1.4" oninput="setChainIntensity(this.value)" style="width:100px;accent-color:#00e5ff;cursor:pointer">
      <span id="chain-intensity-val" style="min-width:36px;text-align:right;color:#00e5ff">1.40x</span>
    </div>
    <div style="display:flex;gap:4px;align-items:center">
      <button id="chain-price-mid" onclick="setPriceMode('mid')" style="font-size:9px;font-weight:800;padding:4px 8px;border:1px solid #00e5ff;border-radius:4px;background:#00e5ff22;color:#00e5ff;cursor:pointer;font-family:Arial">Mid</button>
      <button id="chain-price-last" onclick="setPriceMode('last')" style="font-size:9px;font-weight:800;padding:4px 8px;border:1px solid rgba(255,255,255,.12);border-radius:4px;background:transparent;color:#64748b;cursor:pointer;font-family:Arial">Last</button>
    </div>
    <!-- Spot price -->
    <div style="font-size:11px;color:#e4e4e7;font-weight:700"><span id="chain-ticker-label">--</span> <span id="chain-spot" style="color:var(--cyan);font-family:Arial,monospace">--</span></div>
    <!-- Status -->
    <div id="chain-status-dot" style="width:7px;height:7px;border-radius:50%;background:#1e293b;transition:background .3s"></div>
    <span id="chain-status-txt" style="font-size:9px;color:#475569;font-weight:800;letter-spacing:.08em">--</span>
    <span id="chain-last-update" style="font-size:9px;color:#334155;font-family:Arial,monospace">--:--:--</span>
    <!-- Share buttons -->
    <div style="display:flex;gap:2px;background:transparent;border-radius:2px;padding:2px">
      <button id="chain-copy-btn" onclick="chainCopyScreenshot()" style="font-size:9px;padding:2px 8px;border:none;border-radius:2px;background:transparent;color:#00e5ff;cursor:pointer;font-family:Arial;font-weight:700">COPY</button>
      <button id="chain-share-x-btn" onclick="chainShare('x')" style="font-size:9px;padding:2px 8px;border:none;border-radius:2px;background:transparent;color:#00e5ff;cursor:pointer;font-family:Arial;font-weight:700">X</button>
      <button id="chain-share-discord-btn" onclick="chainShare('discord')" style="font-size:9px;padding:2px 8px;border:none;border-radius:2px;background:transparent;color:#7289da;cursor:pointer;font-family:Arial;font-weight:700">DISCORD</button>
    </div>
  </div>

  <!-- Column headers -->
  <div style="display:grid;background:var(--bg2);border-bottom:2px solid var(--border2);flex-shrink:0;font-size:10px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:#475569" id="chain-header">
    <!-- populated by JS -->
  </div>

  <!-- Scrollable rows / capture zone -->
  <div id="chain-capture-zone" style="flex:1;display:flex;flex-direction:column;min-height:0;background:#05080d">
    <!-- Screenshot header — visible in captures only -->
    <div id="chain-shot-header" style="display:none;padding:8px 14px;background:#05080d;border-bottom:1px solid rgba(0,229,255,.2);flex-shrink:0;align-items:center;gap:12px">
      <span style="font-size:13px;font-weight:800;color:#00e5ff;letter-spacing:.12em;font-family:Arial" id="chain-shot-ticker">SPX</span>
      <span style="font-size:11px;font-weight:700;color:#94a3b8;font-family:Arial" id="chain-shot-expiry">--</span>
      <span style="font-size:10px;color:#475569;font-family:Arial;margin-left:auto" id="chain-shot-time">--:--:--</span>
    </div>
    <div id="chain-body" style="flex:1;overflow-y:auto;overflow-x:auto;min-height:0">
      <div style="display:flex;align-items:center;justify-content:center;height:120px;font-size:12px;color:#475569;font-family:Arial">Select an expiry and click Load</div>
    </div>
  </div>
</div>
