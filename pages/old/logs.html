<div style="display:flex;flex:1;flex-direction:column;min-height:0;overflow:hidden;background:var(--bg0)">
  <div style="padding:14px 20px;background:var(--bg1);border-bottom:1px solid var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:space-between">
    <div style="font-size:11px;font-weight:700;color:var(--cyan);letter-spacing:.15em;text-transform:uppercase">📝 Personal Logs</div>
  </div>

  <!-- MAIN CONTENT GRID -->
  <div style="flex:1;display:grid;grid-template-columns:1fr 1fr;min-height:0;overflow:hidden;gap:20px;padding:20px">
    
    <!-- LEFT: TELEMETRY LOGS -->
    <div style="display:flex;flex-direction:column;min-height:0;overflow:hidden">
      <div style="flex-shrink:0;margin-bottom:14px">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">
          <div style="font-size:11px;font-weight:700;color:var(--cyan);letter-spacing:.15em;text-transform:uppercase">🔹 Telemetry Logs</div>
          <div id="telemetry-count" style="font-size:10px;font-weight:800;color:var(--text0);background:rgba(0,229,255,.2);border:1px solid rgba(0,229,255,.4);padding:3px 8px;border-radius:3px">0 RECORDS</div>
        </div>
        
        <textarea id="telemetry-input" placeholder="Input operational log telemetry... [Ctrl + Enter to send]" style="width:100%;height:80px;background:rgba(0,0,0,.4);border:1px solid var(--border);border-radius:4px;padding:10px;color:var(--text0);font-size:12px;font-family:monospace;resize:none;outline:none;transition:.2s" onkeydown="if(event.ctrlKey && event.key==='Enter') commitLog()"></textarea>
        
        <button onclick="commitLog()" style="width:100%;margin-top:10px;padding:10px;background:rgba(0,229,255,.15);border:1px solid rgba(0,229,255,.4);color:var(--cyan);font-size:11px;font-weight:800;letter-spacing:.12em;cursor:pointer;border-radius:4px;transition:.2s;text-transform:uppercase" onmouseover="this.style.background='rgba(0,229,255,.25)'" onmouseout="this.style.background='rgba(0,229,255,.15)'">💾 Commit Log</button>
      </div>

      <!-- TELEMETRY ENTRIES LIST -->
      <div id="telemetry-list" style="flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:10px;padding-right:8px">
        <!-- Entries will be appended here -->
      </div>
    </div>

    <!-- RIGHT: CONCEPT IDEAS -->
    <div style="display:flex;flex-direction:column;min-height:0;overflow:hidden">
      <div style="flex-shrink:0;margin-bottom:14px">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">
          <div style="font-size:11px;font-weight:700;color:#ffb300;letter-spacing:.15em;text-transform:uppercase">💡 Concept Ideas</div>
          <div id="ideas-count" style="font-size:10px;font-weight:800;color:var(--text0);background:rgba(255,179,0,.2);border:1px solid rgba(255,179,0,.4);padding:3px 8px;border-radius:3px">0 BLUEPRINTS</div>
        </div>
        
        <textarea id="ideas-input" placeholder="Jot down creative blueprint concept... [Ctrl + Enter to send]" style="width:100%;height:80px;background:rgba(0,0,0,.4);border:1px solid var(--border);border-radius:4px;padding:10px;color:var(--text0);font-size:12px;font-family:monospace;resize:none;outline:none;transition:.2s" onkeydown="if(event.ctrlKey && event.key==='Enter') saveIdea()"></textarea>
        
        <button onclick="saveIdea()" style="width:100%;margin-top:10px;padding:10px;background:rgba(255,179,0,.15);border:1px solid rgba(255,179,0,.4);color:#ffb300;font-size:11px;font-weight:800;letter-spacing:.12em;cursor:pointer;border-radius:4px;transition:.2s;text-transform:uppercase" onmouseover="this.style.background='rgba(255,179,0,.25)'" onmouseout="this.style.background='rgba(255,179,0,.15)'">✨ Save Idea</button>
      </div>

      <!-- IDEAS ENTRIES LIST -->
      <div id="ideas-list" style="flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:10px;padding-right:8px">
        <!-- Entries will be appended here -->
      </div>
    </div>
  </div>
</div>

<script>
// LOGS PAGE INITIALIZATION & PERSISTENCE
const LOGS_API = '/proxy/api/personal-logs';

async function initLogsPage() {
  await loadLogs();
}

function getTimestamp() {
  const now = new Date();
  const date = now.toISOString().split('T')[0];
  const time = now.toTimeString().split(' ')[0].slice(0, 5);
  return `${date} @ ${time}`;
}

async function commitLog() {
  const input = document.getElementById('telemetry-input');
  const text = input.value.trim();
  
  if (!text) return;
  
  const entry = {
    type: 'telemetry',
    content: text,
    timestamp: getTimestamp(),
    id: Date.now()
  };
  
  try {
    const res = await fetch(`${LOGS_API}/telemetry`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(entry)
    });
    
    if (!res.ok) throw new Error(`Save failed: ${res.status}`);
    
    input.value = '';
    await loadLogs();
  } catch (e) {
    console.error('Telemetry save error:', e);
    alert('Failed to save telemetry log');
  }
}

async function saveIdea() {
  const input = document.getElementById('ideas-input');
  const text = input.value.trim();
  
  if (!text) return;
  
  const entry = {
    type: 'idea',
    content: text,
    timestamp: getTimestamp(),
    id: Date.now()
  };
  
  try {
    const res = await fetch(`${LOGS_API}/ideas`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(entry)
    });
    
    if (!res.ok) throw new Error(`Save failed: ${res.status}`);
    
    input.value = '';
    await loadLogs();
  } catch (e) {
    console.error('Idea save error:', e);
    alert('Failed to save idea');
  }
}

async function loadLogs() {
  try {
    const res = await fetch(LOGS_API);
    if (!res.ok) throw new Error(`Load failed: ${res.status}`);
    
    const data = await res.json();
    
    renderTelemetryLogs(data.telemetry || []);
    renderIdeas(data.ideas || []);
  } catch (e) {
    console.error('Load logs error:', e);
  }
}

function renderTelemetryLogs(logs) {
  const container = document.getElementById('telemetry-list');
  const count = document.getElementById('telemetry-count');
  
  count.textContent = `${logs.length} RECORD${logs.length !== 1 ? 'S' : ''}`;
  
  container.innerHTML = logs.map(log => `
    <div style="border:1px solid rgba(0,229,255,.2);background:rgba(0,229,255,.045);border-radius:4px;padding:10px;border-left:3px solid rgba(0,229,255,.5)">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px">
        <div style="font-size:10px;color:var(--cyan);font-weight:700;font-variant-numeric:tabular-nums">${log.timestamp}</div>
        <button onclick="deleteLog('telemetry', ${log.id})" style="background:none;border:none;color:var(--text3);cursor:pointer;font-size:14px;padding:0;transition:.2s" onmouseover="this.style.color='#ff5ec4'" onmouseout="this.style.color='var(--text3)'">✕</button>
      </div>
      <div style="font-size:12px;color:var(--text1);line-height:1.5">${escapeHtml(log.content)}</div>
    </div>
  `).join('');
}

function renderIdeas(ideas) {
  const container = document.getElementById('ideas-list');
  const count = document.getElementById('ideas-count');
  
  count.textContent = `${ideas.length} BLUEPRINT${ideas.length !== 1 ? 'S' : ''}`;
  
  container.innerHTML = ideas.map(idea => `
    <div style="border:1px solid rgba(255,179,0,.2);background:rgba(255,179,0,.045);border-radius:4px;padding:10px;border-left:3px solid rgba(255,179,0,.5)">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px">
        <div style="font-size:10px;color:#ffb300;font-weight:700;font-variant-numeric:tabular-nums">${idea.timestamp}</div>
        <button onclick="deleteLog('idea', ${idea.id})" style="background:none;border:none;color:var(--text3);cursor:pointer;font-size:14px;padding:0;transition:.2s" onmouseover="this.style.color='#ff5ec4'" onmouseout="this.style.color='var(--text3)'">✕</button>
      </div>
      <div style="font-size:12px;color:var(--text1);line-height:1.5">${escapeHtml(idea.content)}</div>
    </div>
  `).join('');
}

async function deleteLog(type, id) {
  if (!confirm('Delete this entry?')) return;
  
  try {
    const res = await fetch(`${LOGS_API}/${type}/${id}`, { method: 'DELETE' });
    if (!res.ok) throw new Error(`Delete failed: ${res.status}`);
    await loadLogs();
  } catch (e) {
    console.error('Delete error:', e);
    alert('Failed to delete entry');
  }
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

// Load logs on page init
initLogsPage();
</script>
