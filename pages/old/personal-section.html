<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Personal</title>
  <style>
    :root {
      --bg0:#080c10;--bg1:#0d1117;--bg2:#111822;--bg3:#1a2233;--bg4:#1f2d42;
      --border:#1e3050;--border2:#2a4060;
      --text0:#e8edf5;--text1:#a8b8cc;--text2:#5a7a99;--text3:#3a5570;
      --green:#00e676;--green2:#1fae5e;--red:#ff4757;--red2:#cc2233;
      --amber:#ffb300;--blue:#29b6f6;--cyan:#00e5ff;--purple:#7c4dff;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: var(--bg0);
      color: var(--text0);
      font-family: Arial, sans-serif;
      font-size: 14px;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    /* PIN Screen */
    .pin-screen {
      position: fixed;
      inset: 0;
      background: var(--bg0);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      opacity: 1;
      transition: opacity 0.3s;
    }

    .pin-screen.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .pin-container {
      display: flex;
      flex-direction: column;
      gap: 32px;
      align-items: center;
      width: 100%;
      max-width: 300px;
    }

    .pin-title {
      font-size: 16px;
      font-weight: 700;
      color: var(--text0);
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .pin-input-group {
      display: flex;
      gap: 12px;
      justify-content: center;
    }

    .pin-digit {
      width: 50px;
      height: 50px;
      background: var(--bg2);
      border: 1px solid var(--border2);
      border-radius: 2px;
      font-size: 24px;
      font-weight: 700;
      color: var(--cyan);
      text-align: center;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: monospace;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .pin-digit.filled {
      border-color: var(--cyan);
      box-shadow: 0 0 8px rgba(0, 229, 255, 0.2);
    }

    .pin-keyboard {
      display: grid;
      grid-template-columns: repeat(3, 60px);
      gap: 8px;
      justify-content: center;
    }

    .pin-key {
      width: 60px;
      height: 60px;
      background: var(--bg2);
      border: 1px solid var(--border2);
      border-radius: 2px;
      color: var(--text1);
      font-weight: 600;
      font-size: 12px;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.12s, color 0.12s;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .pin-key:hover {
      background: var(--bg3);
      color: var(--cyan);
    }

    .pin-key.delete {
      grid-column: span 1;
      font-size: 11px;
    }

    .pin-error {
      color: var(--red);
      font-size: 12px;
      height: 16px;
      opacity: 0;
      transition: opacity 0.3s;
    }

    .pin-error.show {
      opacity: 1;
    }

    /* Personal Grid */
    .personal-grid {
      width: 100%;
      max-width: 800px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 24px;
      padding: 20px;
    }

    .card {
      background: var(--bg1);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 24px;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      flex-direction: column;
      gap: 12px;
      min-height: 160px;
    }

    .card:hover {
      background: var(--bg2);
      border-color: var(--border2);
      transform: translateY(-4px);
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
    }

    .card-icon {
      width: 40px;
      height: 40px;
      background: var(--bg3);
      border: 1px solid var(--border2);
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
    }

    .card-title {
      font-size: 14px;
      font-weight: 700;
      color: var(--text0);
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .card-description {
      font-size: 12px;
      color: var(--text2);
      flex-grow: 1;
    }

    .card-footer {
      font-size: 11px;
      color: var(--text3);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .logout-btn {
      position: fixed;
      top: 20px;
      right: 20px;
      padding: 8px 16px;
      background: var(--bg2);
      border: 1px solid var(--border2);
      color: var(--text1);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      border-radius: 2px;
      cursor: pointer;
      transition: all 0.12s;
      z-index: 100;
    }

    .logout-btn:hover {
      background: var(--red2);
      color: var(--red);
      border-color: var(--red);
    }
  </style>
</head>
<body>

<button class="logout-btn" id="logoutBtn">Logout</button>

<!-- PIN Screen -->
<div class="pin-screen" id="pinScreen">
  <div class="pin-container">
    <div class="pin-title">Enter PIN</div>
    
    <div class="pin-input-group" id="pinDisplay">
      <div class="pin-digit" data-index="0"></div>
      <div class="pin-digit" data-index="1"></div>
      <div class="pin-digit" data-index="2"></div>
      <div class="pin-digit" data-index="3"></div>
    </div>

    <div class="pin-keyboard" id="pinKeyboard"></div>

    <div class="pin-error" id="pinError">Incorrect PIN</div>
  </div>
</div>

<!-- Personal Grid -->
<div class="personal-grid" id="personalGrid">
  <div class="card" data-section="budget">
    <div class="card-icon">💰</div>
    <div class="card-title">Budget</div>
    <div class="card-description">Track expenses and manage your financial goals</div>
    <div class="card-footer">Click to open</div>
  </div>

  <div class="card" data-section="todo">
    <div class="card-icon">✓</div>
    <div class="card-title">Todo</div>
    <div class="card-description">Organize tasks and stay on top of priorities</div>
    <div class="card-footer">Click to open</div>
  </div>

  <div class="card" data-section="trading">
    <div class="card-icon">📈</div>
    <div class="card-title">Trading</div>
    <div class="card-description">Review your trading performance and metrics</div>
    <div class="card-footer">Click to open</div>
  </div>

  <div class="card" data-section="personal">
    <div class="card-icon">👤</div>
    <div class="card-title">Personal</div>
    <div class="card-description">Personal notes and information</div>
    <div class="card-footer">Click to open</div>
  </div>
</div>

<script>
  const VALID_PINS = ['0312', '9365'];
  let pinAttempt = '';
  const pinScreen = document.getElementById('pinScreen');
  const personalGrid = document.getElementById('personalGrid');
  const pinError = document.getElementById('pinError');

  // Generate PIN keyboard
  function initPinKeyboard() {
    const keyboard = document.getElementById('pinKeyboard');
    
    for (let i = 1; i <= 9; i++) {
      const btn = document.createElement('div');
      btn.className = 'pin-key';
      btn.textContent = i;
      btn.onclick = () => addPin(i);
      keyboard.appendChild(btn);
    }

    const zeroBtn = document.createElement('div');
    zeroBtn.className = 'pin-key';
    zeroBtn.textContent = '0';
    zeroBtn.onclick = () => addPin(0);
    keyboard.appendChild(zeroBtn);

    const deleteBtn = document.createElement('div');
    deleteBtn.className = 'pin-key delete';
    deleteBtn.textContent = '← Delete';
    deleteBtn.onclick = deletePin;
    keyboard.appendChild(deleteBtn);
  }

  function addPin(digit) {
    if (pinAttempt.length < 4) {
      pinAttempt += digit;
      updatePinDisplay();
      
      if (pinAttempt.length === 4) {
        setTimeout(checkPin, 300);
      }
    }
  }

  function deletePin() {
    pinAttempt = pinAttempt.slice(0, -1);
    updatePinDisplay();
    pinError.classList.remove('show');
  }

  function updatePinDisplay() {
    document.querySelectorAll('.pin-digit').forEach((digit, index) => {
      if (index < pinAttempt.length) {
        digit.textContent = '●';
        digit.classList.add('filled');
      } else {
        digit.textContent = '';
        digit.classList.remove('filled');
      }
    });
  }

  function checkPin() {
    if (VALID_PINS.includes(pinAttempt)) {
      pinScreen.classList.add('hidden');
      personalGrid.style.opacity = '1';
      personalGrid.style.pointerEvents = 'auto';
    } else {
      showError();
      pinAttempt = '';
      updatePinDisplay();
    }
  }

  function showError() {
    pinError.classList.add('show');
    setTimeout(() => {
      pinError.classList.remove('show');
    }, 1500);
  }

  // Card click handlers
  document.querySelectorAll('.card').forEach(card => {
    card.addEventListener('click', function() {
      const section = this.dataset.section;
      console.log('Clicked:', section);
      // Update this when sections are ready
      alert(`${section.toUpperCase()} section - coming soon`);
    });
  });

  // Initialize
  initPinKeyboard();
  personalGrid.style.opacity = '0';
  personalGrid.style.pointerEvents = 'none';

  // Logout functionality
  document.getElementById('logoutBtn').addEventListener('click', () => {
    pinAttempt = '';
    updatePinDisplay();
    pinScreen.classList.remove('hidden');
    personalGrid.style.opacity = '0';
    personalGrid.style.pointerEvents = 'none';
  });
</script>

</body>
</html>
